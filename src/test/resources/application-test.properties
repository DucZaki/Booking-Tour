# Tests: in-memory DB, no Flyway (avoids local MySQL / failed V6 history)
spring.datasource.url=jdbc:h2:mem:booking_tour_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=never

GOOGLE_CLIENT_ID=disabled
GOOGLE_CLIENT_SECRET=disabled
FACEBOOK_CLIENT_ID=disabled
FACEBOOK_CLIENT_SECRET=disabled
