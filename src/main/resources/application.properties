spring.application.name=BookingTour
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Tắt cache template - không cần restart khi sửa HTML
spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://kodama.proxy.rlwy.net:54814/booking_tour?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${RAILWAY_MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Flyway (shared DB schema migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If the shared DB already exists, baseline it once then continue with migrations.
spring.flyway.baseline-on-migrate=true
image.path=${java.io.tmpdir}booking-tour/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
avatar.path=src/main/resources/static/anh/user/
# messages.properties
spring.security.ui.password=Password
spring.security.ui.username=Username
spring.security.ui.login=Sign in
spring.security.ui.remember=Remember me
spring.security.ui.error=Invalid credentials
debug=false

logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
spring.jackson.serialization.fail-on-empty-beans=false
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Google OAuth2 (để trống nếu chưa có key — đăng nhập Google sẽ không dùng được)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=email,profile

# Facebook OAuth2
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email

# Amadeus API
amadeus.api.key=${AMADEUS_API_KEY:}
amadeus.api.secret=${AMADEUS_API_SECRET:}
amadeus.api.base-url=https://test.api.amadeus.com

# VNPay Config
vnp.pay-url=${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnp.return-url=${VNP_RETURN_URL:http://localhost:8080/payment/vnpay-callback}
vnp.ipn-url=${VNP_IPN_URL:http://localhost:8080/payment/vnpay-ipn}
vnp.tmn-code=${VNP_TMN_CODE:}
vnp.hash-secret=${VNP_HASH_SECRET:}
vnp.api-url=${VNP_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

# NewsAPI Config
news.api.token=${NEWS_API_TOKEN:}

# Chatbot AI — ưu tiên: Groq → OpenRouter → Gemini
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=${GROQ_MODEL:llama-3.1-8b-instant}

openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.model=${OPENROUTER_MODEL:google/gemini-2.0-flash-exp:free}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Email (SMTP) - set via environment variables for local/dev
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Default "from" name/address (hiển thị: ZakiBooking <email>)
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.enabled=${MAIL_ENABLED:true}

# Base URL dùng trong QR check-in (local / ngrok / production)
app.base-url=${APP_BASE_URL:http://localhost:8080}
