# Production (Railway/AWS): set SPRING_PROFILES_ACTIVE=prod
# Required env: SPRING_DATASOURCE_*, APP_BASE_URL, VNP_TMN_CODE, VNP_HASH_SECRET, API keys as needed

spring.thymeleaf.cache=true
spring.jpa.show-sql=false

# VNPay callbacks follow APP_BASE_URL if VNP_RETURN_URL / VNP_IPN_URL are not set
vnp.return-url=${VNP_RETURN_URL:${APP_BASE_URL}/payment/vnpay-callback}
vnp.ipn-url=${VNP_IPN_URL:${APP_BASE_URL}/payment/vnpay-ipn}
