<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Check-in ZakiBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f4f5; min-height: 100vh; }
        .brand { font-size: 1.5rem; font-weight: 800; }
        .brand-zaki { color: #ffc107; }
        .status-valid { border-left: 4px solid #28a745; }
        .status-invalid { border-left: 4px solid #dc3545; }
        .status-done { border-left: 4px solid #0d6efd; }
    </style>
</head>
<body class="d-flex align-items-center py-4">
<div class="container" style="max-width: 480px;">
    <div class="text-center mb-4">
        <div class="brand"><span class="brand-zaki">Zaki</span><span class="text-dark">Booking</span></div>
        <div class="text-muted small">Xác thực vé — Check-in</div>
    </div>

    <div th:if="${flashMessage}" class="alert py-2"
         th:classappend="${flashSuccess} ? 'alert-success' : 'alert-warning'"
         th:text="${flashMessage}"></div>

    <!-- Vé không hợp lệ -->
    <div th:if="${!valid}" class="card border-0 shadow-sm status-invalid">
        <div class="card-body text-center p-4">
            <i class="bi bi-x-circle text-danger display-4"></i>
            <h5 class="fw-bold mt-3">Vé không hợp lệ</h5>
            <p class="text-muted mb-0" th:text="${message}">Mã QR không tồn tại.</p>
        </div>
    </div>

    <!-- Vé hợp lệ -->
    <div th:if="${valid}" class="card border-0 shadow-sm"
         th:classappend="${checkedIn} ? 'status-done' : (${paid} ? 'status-valid' : 'status-invalid')">
        <div class="card-body p-4">
            <div class="text-center mb-3">
                <span th:if="${checkedIn}" class="badge bg-primary rounded-pill px-3 py-2">
                    <i class="bi bi-check2-all me-1"></i> Đã check-in
                </span>
                <span th:if="${!checkedIn and paid}" class="badge bg-success rounded-pill px-3 py-2">
                    <i class="bi bi-patch-check me-1"></i> Vé hợp lệ
                </span>
                <span th:if="${!paid}" class="badge bg-danger rounded-pill px-3 py-2">
                    Chưa thanh toán
                </span>
            </div>

            <h5 class="fw-bold text-center mb-1" th:text="${tourTitle}">Tour</h5>
            <p class="text-center text-muted small mb-3">
                Mã đơn <strong th:text="'#' + ${orderId}">#1</strong>
                · Mã tour <strong th:text="${tourCode}">ZAKI1</strong>
            </p>

            <ul class="list-unstyled small mb-0">
                <li class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Khách hàng</span>
                    <strong th:text="${customerName}">—</strong>
                </li>
                <li class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Số khách</span>
                    <strong th:text="${guestCount} + ' người'">1 người</strong>
                </li>
                <li class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Điểm khởi hành</span>
                    <strong th:text="${departurePoint}">—</strong>
                </li>
                <li class="d-flex justify-content-between py-2 border-bottom">
                    <span class="text-muted">Ngày đi</span>
                    <strong th:text="${departureDate}">—</strong>
                </li>
                <li th:if="${checkedInAt}" class="d-flex justify-content-between py-2">
                    <span class="text-muted">Check-in lúc</span>
                    <strong th:text="${checkedInAt}">—</strong>
                </li>
            </ul>

            <!-- Khách hàng: mã QR để nhân viên quét khi lên tour -->
            <div th:if="${paid and !checkedIn and qrUrl != null}" sec:authorize="!hasAnyRole('ADMIN','GUIDE')"
                 class="text-center mt-4">
                <img th:src="${qrUrl}" alt="QR check-in" width="200" height="200"
                     class="border rounded-3 p-2 bg-white">
                <p class="text-muted small mt-3 mb-0">
                    <i class="bi bi-info-circle me-1"></i> Đưa mã QR này cho nhân viên ZakiBooking để check-in.
                </p>
            </div>

            <!-- Admin: xác nhận check-in -->
            <form th:if="${paid and !checkedIn}" sec:authorize="hasAnyRole('ADMIN','GUIDE')"
                  th:action="@{/check-in/{token}/confirm(token=${token})}" method="post" class="mt-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-warning w-100 fw-bold py-2">
                    <i class="bi bi-qr-code-scan me-1"></i> Xác nhận check-in
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
