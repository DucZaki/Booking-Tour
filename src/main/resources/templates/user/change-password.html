<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout/layout :: layout(~{::content})}">

<body>
    <th:block th:fragment="content">
        <div class="container my-5 pt-4">
            <div class="mb-3">
                <a th:href="@{/user/profile}" class="text-decoration-none text-dark small fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại hồ sơ
                </a>
            </div>
            <div class="row">

                <!-- SIDEBAR (Consistent with profile/edit) -->
                <div class="col-lg-3 mb-4">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center mb-3">
                                <div class="rounded-circle bg-warning text-white d-flex align-items-center justify-content-center fw-bold"
                                    style="width:48px;height:48px;font-size:1.2rem;">
                                    <span
                                        th:text="${(user.hoTen != null and #strings.length(user.hoTen) > 0) ? #strings.substring(user.hoTen,0,1) : '?'}"></span>
                                </div>
                                <div class="ms-3">
                                    <h6 class="mb-0 fw-bold" th:text="${user.hoTen ?: 'Khách hàng'}"></h6>
                                    <p class="mb-0 text-muted small" th:text="${user.email ?: 'Chưa cập nhật email'}">
                                    </p>
                                </div>
                            </div>

                            <!-- Hạng thành viên badge -->
                            <div class="mb-3 text-center">
                                <span class="tier-badge" th:classappend="${memberTierColor}"
                                    th:text="${memberTierIcon + ' ' + memberTier}"></span>

                                <!-- Thanh tiến trình -->
                                <div class="mt-2" th:if="${memberTier != 'Kim Cương'}">
                                    <div class="d-flex justify-content-between small text-muted mb-1">
                                        <span
                                            th:text="${#numbers.formatDecimal(totalSpending, 1, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                                        <span
                                            th:text="${memberTier == 'Đồng' ? '10 tr' : memberTier == 'Bạc' ? '20 tr' : memberTier == 'Vàng' ? '50 tr' : '100 tr'}"></span>
                                    </div>
                                    <div class="tier-progress-wrap">
                                        <div class="tier-progress-bar"
                                            th:classappend="${memberTierColor.replace('tier-','')}"
                                            th:style="'width:' + ${tierProgress} + '%'">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="list-group list-group-flush small">
                                <a th:href="@{/user/profile}"
                                    class="list-group-item list-group-item-action border-0 mb-1">
                                    <i class="bi bi-person me-2"></i> Tài khoản
                                </a>
                                <a th:href="@{/user/bookings}"
                                    class="list-group-item list-group-item-action border-0 mb-1">
                                    <i class="bi bi-luggage me-2"></i> Đơn đặt chỗ
                                </a>
                                <form th:action="@{/logout}" method="post" class="p-0">
                                    <button type="submit"
                                        class="list-group-item list-group-item-action text-danger fw-bold border-0">
                                        <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CHANGE PASSWORD FORM -->
                <div class="col-lg-9">
                    <h3 class="fw-bold mb-4 text-center">Đổi mật khẩu</h3>
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-body p-4 p-md-5">

                            <!-- Hiển thị thông báo lỗi nếu có -->
                            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4"
                                role="alert">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <span th:text="${error}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <form th:action="@{/user/change-password}" method="post">
                                <div class="row g-4">
                                    <div class="col-md-12">
                                        <label class="form-label small text-muted text-uppercase fw-bold">Mật khẩu hiện
                                            tại</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light"><i
                                                    class="bi bi-shield-lock"></i></span>
                                            <input type="password" name="oldPassword"
                                                class="form-control form-control-lg border-0 bg-light rounded-end-3"
                                                required placeholder="Nhập mật khẩu cũ...">
                                        </div>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label small text-muted text-uppercase fw-bold">Mật khẩu
                                            mới</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light"><i
                                                    class="bi bi-key"></i></span>
                                            <input type="password" name="newPassword"
                                                class="form-control form-control-lg border-0 bg-light rounded-end-3"
                                                required placeholder="Nhập mật khẩu mới...">
                                        </div>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label small text-muted text-uppercase fw-bold">Xác nhận mật
                                            khẩu mới</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light"><i
                                                    class="bi bi-key-fill"></i></span>
                                            <input type="password" name="confirmPassword"
                                                class="form-control form-control-lg border-0 bg-light rounded-end-3"
                                                required placeholder="Nhập lại mật khẩu mới...">
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-5 pt-4 border-top text-end">
                                    <a th:href="@{/user/profile}"
                                        class="btn btn-outline-secondary rounded-pill px-4 fw-bold me-2">Hủy bỏ</a>
                                    <button type="submit" class="btn btn-warning rounded-pill px-5 fw-bold shadow">
                                        <i class="bi bi-shield-check me-1"></i> Xác nhận đổi mật khẩu
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </th:block>
</body>

</html>
