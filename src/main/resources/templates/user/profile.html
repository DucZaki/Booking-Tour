<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout/layout :: layout(~{::content})}">

<body>
    <th:block th:fragment="content">
        <div class="container my-5 pt-4">
            <div class="mb-3">
                <a th:href="@{/}" class="text-decoration-none text-dark small fw-bold">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại trang chủ
                </a>
            </div>
            <div class="row">

                <!-- SIDEBAR -->
                <div class="col-lg-3 mb-4">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center mb-3">
                                <div class="rounded-circle bg-warning text-white d-flex align-items-center justify-content-center fw-bold"
                                    style="width:48px;height:48px;font-size:1.2rem;">
                                    <span
                                        th:text="${(user.hoTen != null and #strings.length(user.hoTen) > 0) ? #strings.substring(user.hoTen,0,1) : '?'}"></span>
                                </div>
                                <div class="ms-3">
                                    <h6 class="mb-0 fw-bold" th:text="${user.hoTen ?: 'Khách hàng'}"></h6>
                                    <p class="mb-0 text-muted small" th:text="${user.email ?: 'Chưa cập nhật email'}">
                                    </p>
                                </div>
                            </div>

                            <!-- Hạng thành viên badge -->
                            <div class="mb-3 text-center">
                                <span class="tier-badge" th:classappend="${memberTierColor}"
                                    th:text="${memberTierIcon + ' ' + memberTier}"></span>

                                <!-- Thanh tiến trình -->
                                <div class="mt-2" th:if="${memberTier != 'Kim Cương'}">
                                    <div class="d-flex justify-content-between small text-muted mb-1">
                                        <span
                                            th:text="${#numbers.formatDecimal(totalSpending, 1, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                                        <span
                                            th:text="${memberTier == 'Đồng' ? '10 tr' : memberTier == 'Bạc' ? '20 tr' : memberTier == 'Vàng' ? '50 tr' : '100 tr'}"></span>
                                    </div>
                                    <div class="tier-progress-wrap">
                                        <div class="tier-progress-bar"
                                            th:classappend="${memberTierColor.replace('tier-','')}"
                                            th:style="'width:' + ${tierProgress} + '%'">
                                        </div>
                                    </div>
                                    <p class="small text-muted mt-1 mb-0">
                                        Đến hạng <strong
                                            th:text="${memberTier == 'Đồng' ? 'Bạc 🥈' : memberTier == 'Bạc' ? 'Vàng 🥇' : memberTier == 'Vàng' ? 'Bạch Kim 💎' : 'Kim Cương 👑'}"></strong>
                                    </p>
                                </div>
                                <div class="mt-1" th:if="${memberTier == 'Kim Cương'}">
                                    <p class="small text-muted mb-0">✨ Đã đạt hạng cao nhất!</p>
                                </div>
                            </div>

                            <div class="list-group list-group-flush small">
                                <a th:href="@{/user/profile}"
                                    class="list-group-item list-group-item-action fw-bold border-0 bg-light rounded mb-1">
                                    <i class="bi bi-person me-2"></i> Tài khoản
                                </a>
                                <a th:href="@{/user/bookings}"
                                    class="list-group-item list-group-item-action border-0 mb-1">
                                    <i class="bi bi-luggage me-2"></i> Đơn đặt chỗ
                                </a>
                                <a th:href="@{/favorites/my-favorites}"
                                    class="list-group-item list-group-item-action border-0 mb-1">
                                    <i class="bi bi-bookmark-heart me-2"></i> Các tour yêu thích
                                </a>
                                <form th:action="@{/logout}" method="post" class="p-0">
                                    <button type="submit"
                                        class="list-group-item list-group-item-action text-danger fw-bold border-0">
                                        <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MAIN CONTENT -->
                <div class="col-lg-9">
                    <h3 class="fw-bold mb-4 text-center">Thông tin cá nhân</h3>
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-body p-4 p-md-5">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Họ và
                                        tên</label>
                                    <h5 class="fw-bold border-bottom pb-2" th:text="${user.hoTen ?: 'Chưa cập nhật'}">
                                    </h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Email
                                        liên hệ</label>
                                    <h5 class="fw-bold border-bottom pb-2" th:text="${user.email}"></h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Số điện
                                        thoại</label>
                                    <h5 class="fw-bold border-bottom pb-2" th:text="${user.number ?: 'Chưa cập nhật'}">
                                    </h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Tên đăng
                                        nhập</label>
                                    <h5 class="fw-bold border-bottom pb-2 text-primary" th:text="${user.tenDangNhap}">
                                    </h5>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Vai trò
                                        hệ thống</label>
                                    <div>
                                        <span
                                            class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-bold"
                                            th:text="${user.vaiTro}"></span>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted mb-1 d-block font-monospace text-uppercase">Hạng
                                        thành viên</label>
                                    <div class="d-flex align-items-center">
                                        <span class="tier-badge" th:classappend="${memberTierColor}"
                                            th:text="${memberTierIcon + ' ' + memberTier}"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 pt-4 border-top">
                                <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
                                    <div>
                                        <p class="small text-muted mb-0">Tổng tích lũy chi tiêu:</p>
                                        <h4 class="text-danger fw-bold mb-0"
                                            th:text="${#numbers.formatDecimal(totalSpending, 1, 'COMMA', 0, 'POINT')} + ' ₫'">
                                        </h4>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/user/change-password}"
                                            class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm">
                                            <i class="bi bi-key me-1"></i> Đổi mật khẩu
                                        </a>
                                        <a th:href="@{/user/edit-profile}"
                                            class="btn btn-outline-primary rounded-pill px-4 fw-bold">
                                            <i class="bi bi-pencil me-1"></i> Chỉnh sửa
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </th:block>
</body>

</html>
