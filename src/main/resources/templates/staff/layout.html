<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="staffLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle != null ? pageTitle + ' | ZakiBooking Ops' : 'ZakiBooking Ops'}">ZakiBooking Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f4f5; min-height: 100vh; }
        .ops-header { background: #121416; color: #fff; }
        .ops-brand { font-weight: 800; letter-spacing: -0.02em; }
        .ops-brand span { color: #fecf2f; }
        .ops-nav a { color: rgba(255,255,255,0.75); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .ops-nav a.active, .ops-nav a:hover { color: #fecf2f; }
        .status-pill { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    </style>
</head>
<body>
<header class="ops-header py-3 mb-4">
    <div class="container d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
            <div class="ops-brand"><span>Zaki</span>Booking Ops</div>
            <div class="small text-white-50">Điều hành tour · Check-in</div>
        </div>
        <nav class="ops-nav d-flex flex-wrap gap-3 align-items-center">
            <a th:href="@{/staff}" th:classappend="${activeOpsNav == 'home'} ? 'active' : ''"><i class="bi bi-calendar-event me-1"></i>Đoàn của tôi</a>
            <a th:href="@{/staff/scan}" th:classappend="${activeOpsNav == 'scan'} ? 'active' : ''"><i class="bi bi-qr-code-scan me-1"></i>Quét QR</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"><i class="bi bi-shield-lock me-1"></i>Admin</a>
            <a th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>Thoát</a>
        </nav>
    </div>
</header>
<main class="container pb-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:replace="${content}">...</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
