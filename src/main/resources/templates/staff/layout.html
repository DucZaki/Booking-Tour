<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="staffLayout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle != null ? pageTitle + ' | ZakiBooking Guide' : 'ZakiBooking Guide'}">ZakiBooking Guide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --guide-ink: #15120a;
            --guide-muted: #6f6a5f;
            --guide-yellow: #fecf2f;
            --guide-cream: #fff7df;
            --guide-line: rgba(21,18,10,0.08);
            --guide-shadow: 0 18px 50px rgba(21,18,10,0.08);
        }
        body {
            background:
                radial-gradient(circle at top left, rgba(254,207,47,0.24), transparent 34rem),
                linear-gradient(180deg, #fffaf0 0%, #f7f4ee 42%, #f4f4f5 100%);
            color: var(--guide-ink);
            min-height: 100vh;
        }
        .ops-header {
            background: rgba(21,18,10,0.92);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 1030;
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .ops-brand { font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
        .ops-brand span { color: var(--guide-yellow); }
        .ops-subtitle { color: rgba(255,255,255,0.58); font-size: 0.78rem; }
        .ops-nav a {
            color: rgba(255,255,255,0.72);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.55rem 0.8rem;
            border-radius: 999px;
            transition: all 0.2s ease;
        }
        .ops-nav a.active, .ops-nav a:hover { background: rgba(254,207,47,0.14); color: var(--guide-yellow); }
        .guide-shell { padding-top: 1.25rem; }
        .guide-hero {
            background: linear-gradient(135deg, #15120a 0%, #2d2510 54%, #fecf2f 160%);
            color: #fff;
            border-radius: 28px;
            padding: clamp(1.35rem, 4vw, 2.4rem);
            box-shadow: var(--guide-shadow);
            overflow: hidden;
            position: relative;
        }
        .guide-hero::after {
            content: "";
            position: absolute;
            width: 18rem;
            height: 18rem;
            right: -7rem;
            top: -8rem;
            background: rgba(254,207,47,0.22);
            border-radius: 50%;
        }
        .guide-card {
            border: 1px solid var(--guide-line) !important;
            border-radius: 24px !important;
            box-shadow: var(--guide-shadow) !important;
        }
        .guide-stat {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 20px;
            padding: 1rem;
        }
        .guide-icon {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(254,207,47,0.22);
            color: var(--guide-ink);
        }
        .status-pill { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
        .btn-guide {
            background: var(--guide-yellow);
            border-color: var(--guide-yellow);
            color: #000;
            font-weight: 800;
        }
        .btn-guide:hover { background: #e9b90f; border-color: #e9b90f; color: #000; }
        .table-guide thead th { color: var(--guide-muted); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.04em; }
        @media (max-width: 767.98px) {
            .ops-header { position: static; }
            .ops-nav { width: 100%; justify-content: space-between; }
            .ops-nav a { flex: 1 1 auto; text-align: center; padding-inline: 0.45rem; }
            .guide-shell { padding-top: 0.25rem; }
        }
    </style>
</head>
<body>
<header class="ops-header py-3 mb-4">
    <div class="container d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
            <div class="ops-brand"><span>Zaki</span>Booking Guide</div>
            <div class="ops-subtitle">Bảng điều phối dành cho hướng dẫn viên</div>
        </div>
        <nav class="ops-nav d-flex flex-wrap gap-3 align-items-center">
            <a th:href="@{/staff}" th:classappend="${activeOpsNav == 'home'} ? 'active' : ''"><i class="bi bi-map me-1"></i>Đoàn</a>
            <a th:href="@{/staff/scan}" th:classappend="${activeOpsNav == 'scan'} ? 'active' : ''"><i class="bi bi-qr-code-scan me-1"></i>Quét vé</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"><i class="bi bi-shield-lock me-1"></i>Admin</a>
            <a th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>Thoát</a>
        </nav>
    </div>
</header>
<main class="container guide-shell pb-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:replace="${content}">...</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
