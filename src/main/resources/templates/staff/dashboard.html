<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      th:replace="~{staff/layout :: staffLayout(~{::section})}">
<section th:with="activeOpsNav='home', pageTitle='Đoàn của tôi'">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="h4 fw-bold mb-1">Chuyến khởi hành sắp tới</h1>
            <p class="text-muted small mb-0" th:if="${!isAdminView}">
                Xin chào <strong th:text="${guide.hoTen}">HDV</strong> — chỉ hiển thị đoàn được phân công.
            </p>
            <p class="text-muted small mb-0" th:if="${isAdminView}">Chế độ Admin — xem tất cả đoàn trong 14 ngày tới.</p>
        </div>
        <a th:href="@{/staff/scan}" class="btn btn-dark rounded-pill px-4">
            <i class="bi bi-qr-code-scan me-1"></i> Quét QR
        </a>
    </div>

    <div th:if="${#lists.isEmpty(departures)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5 text-muted">
            <i class="bi bi-calendar-x display-4 d-block mb-3"></i>
            Chưa có đoàn nào được phân công. Liên hệ Admin để gán HDV cho ngày khởi hành.
        </div>
    </div>

    <div class="row g-3" th:if="${!#lists.isEmpty(departures)}">
        <div class="col-md-6 col-lg-4" th:each="d : ${departures}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <span class="badge rounded-pill mb-2"
                          th:classappend="${d.trangThaiDoanEnum.name() == 'COMPLETED'} ? 'bg-secondary' : (${d.trangThaiDoanEnum.name() == 'IN_PROGRESS'} ? 'bg-success' : 'bg-warning text-dark')"
                          th:text="${d.trangThaiDoanEnum.label}">Sắp khởi hành</span>
                    <h2 class="h6 fw-bold" th:text="${d.chuyenDi.tieuDe}">Tour</h2>
                    <p class="small text-muted mb-2">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${#temporals.format(d.ngay, 'dd/MM/yyyy')}">01/06/2026</span>
                    </p>
                    <p class="small mb-3" th:if="${d.guide != null}">
                        <i class="bi bi-person-badge me-1"></i>
                        <span th:text="${d.guide.hoTen}">HDV</span>
                    </p>
                    <a th:href="@{/staff/departures/{id}/manifest(id=${d.id})}"
                       class="btn btn-outline-dark btn-sm rounded-pill w-100">
                        Danh sách hành khách →
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
