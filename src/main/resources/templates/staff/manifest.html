<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      th:replace="~{staff/layout :: staffLayout(~{::section})}">
<section th:with="activeOpsNav='manifest', pageTitle='Manifest'">
    <div class="mb-3">
        <a th:href="@{/staff}" class="btn btn-link btn-sm ps-0 text-decoration-none"><i class="bi bi-arrow-left"></i> Quay lại</a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <span class="badge bg-warning text-dark status-pill mb-2" th:text="${nkh.trangThaiDoanEnum.label}">Sắp KH</span>
                    <h1 class="h4 fw-bold mb-1" th:text="${nkh.chuyenDi.tieuDe}">Tour</h1>
                    <p class="text-muted small mb-0">
                        Ngày đi <strong th:text="${#temporals.format(nkh.ngay, 'dd/MM/yyyy')}">—</strong>
                        · Chuyến bay đi <strong th:text="${nkh.maChuyenBayDi != null ? nkh.maChuyenBayDi : '—'}">—</strong>
                    </p>
                </div>
                <form th:action="@{/staff/departures/{id}/status(id=${nkh.id})}" method="post" class="d-flex gap-2 align-items-center">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <select name="status" class="form-select form-select-sm" style="width:auto;">
                        <option th:each="gs : ${groupStatuses}" th:value="${gs.name()}" th:text="${gs.label}"
                                th:selected="${gs == nkh.trangThaiDoanEnum}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-dark">Cập nhật đoàn</button>
                </form>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fs-4 fw-bold" th:text="${stats.bookingCount}">0</div>
                <div class="small text-muted">Đơn đã TT</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fs-4 fw-bold text-success" th:text="${stats.checkedIn}">0</div>
                <div class="small text-muted">Đã có mặt</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fs-4 fw-bold text-warning" th:text="${stats.pending}">0</div>
                <div class="small text-muted">Chưa đến</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fs-4 fw-bold text-danger" th:text="${stats.absent}">0</div>
                <div class="small text-muted">Vắng / hủy</div>
            </div>
        </div>
    </div>

    <form method="get" class="row g-2 mb-3">
        <div class="col-md-8">
            <input type="search" name="q" class="form-control" placeholder="Tìm theo tên, SĐT hoặc mã đơn..."
                   th:value="${keyword}">
        </div>
        <div class="col-md-4 d-flex gap-2">
            <button type="submit" class="btn btn-dark flex-grow-1"><i class="bi bi-search me-1"></i> Tìm</button>
            <a th:href="@{/staff/scan}" class="btn btn-outline-dark"><i class="bi bi-qr-code-scan"></i></a>
        </div>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Họ tên</th>
                    <th>SĐT</th>
                    <th>Khách</th>
                    <th>Điểm đón</th>
                    <th>CCCD/HP</th>
                    <th>Ghế / chuyến</th>
                    <th>Phòng</th>
                    <th>Trạng thái</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="'#' + ${b.id}">#1</td>
                    <td class="fw-semibold" th:text="${b.hoTen}">—</td>
                    <td th:text="${b.soDienThoai != null ? b.soDienThoai : '—'}">—</td>
                    <td th:text="${b.soLuong}">1</td>
                    <td th:text="${b.idDiemDon != null ? b.idDiemDon.ten : '—'}">—</td>
                    <td th:text="${b.soGiayTo != null ? b.soGiayTo : '—'}">—</td>
                    <td th:text="${b.soGhe != null ? b.soGhe : (nkh.maChuyenBayDi != null ? nkh.maChuyenBayDi : '—')}">—</td>
                    <td th:text="${b.soPhong != null ? b.soPhong : (b.soPhongDon != null and b.soPhongDon > 0 ? 'Đơn x' + b.soPhongDon : '—')}">—</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${b.checkinStatusEnum.name() == 'CHECKED_IN'} ? 'bg-success' : (${b.checkinStatusEnum.name() == 'LATE'} ? 'bg-info' : (${b.checkinStatusEnum.name() == 'PENDING'} ? 'bg-secondary' : 'bg-danger'))"
                              th:text="${b.checkinStatusEnum.label}">—</span>
                    </td>
                    <td>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown">Điểm danh</button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li th:each="st : ${statuses}">
                                    <form th:action="@{/staff/bookings/{id}/checkin-status(id=${b.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="nkhId" th:value="${nkh.id}"/>
                                        <input type="hidden" name="status" th:value="${st.name()}"/>
                                        <button type="submit" class="dropdown-item" th:text="${st.label}">—</button>
                                    </form>
                                </li>
                                <li th:if="${b.maCheckIn != null}">
                                    <a class="dropdown-item" th:href="@{/staff/check-in/{t}(t=${b.maCheckIn})}">Mở vé QR</a>
                                </li>
                            </ul>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="10" class="text-center text-muted py-4">Chưa có khách đã thanh toán cho ngày này.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
