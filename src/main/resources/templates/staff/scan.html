<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      th:replace="~{staff/layout :: staffLayout(~{::section})}">
<section th:with="activeOpsNav='scan', pageTitle='Quét QR'">
    <div class="guide-hero mx-auto mb-4" style="max-width:720px;">
        <div class="position-relative text-center" style="z-index: 1;">
            <span class="badge rounded-pill text-bg-warning text-dark mb-3 px-3 py-2">Check-in nhanh</span>
            <h1 class="h3 fw-bold">Quét mã QR khách</h1>
            <p class="text-white-50 mb-0">Hướng camera vào QR trên email hoặc mục "Vé của tôi" để mở thông tin đặt chỗ.</p>
        </div>
    </div>
    <div class="card guide-card mx-auto" style="max-width:520px;">
        <div class="card-body p-3 p-md-4">
            <div id="qr-reader" class="w-100 rounded-4 overflow-hidden bg-dark"></div>
            <p id="qr-status" class="small text-muted text-center mt-3 mb-0">Đang khởi động camera...</p>
        </div>
    </div>
    <div class="card guide-card mx-auto mt-3" style="max-width:520px;">
        <div class="card-body p-3">
            <p class="small text-muted mb-2">Không mở được camera? Nhập mã check-in thủ công.</p>
            <form th:action="@{/staff/check-in/manual}" method="get" class="d-flex gap-2 flex-wrap" onsubmit="return manualToken(event)">
                <input type="text" id="manualToken" class="form-control" style="min-width:220px; flex: 1;" placeholder="Dán mã hoặc URL check-in">
                <button type="submit" class="btn btn-dark rounded-pill px-4">Mở vé</button>
        </form>
        </div>
    </div>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        function extractToken(text) {
            if (!text) return '';
            var t = text.trim();
            var m = t.match(/\/check-in\/([a-f0-9]+)/i);
            if (m) return m[1];
            return t.replace(/[^a-f0-9]/gi, '');
        }
        function manualToken(e) {
            e.preventDefault();
            var token = extractToken(document.getElementById('manualToken').value);
            if (token) window.location.href = '/staff/check-in/' + token;
            return false;
        }
        document.addEventListener('DOMContentLoaded', function () {
            var statusEl = document.getElementById('qr-status');
            if (!window.Html5Qrcode) {
                statusEl.textContent = 'Trình duyệt không hỗ trợ quét QR - dùng ô nhập mã bên dưới.';
                return;
            }
            var scanner = new Html5Qrcode('qr-reader');
            scanner.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                function (decoded) {
                    var token = extractToken(decoded);
                    if (token) {
                        scanner.stop().then(function () {
                            window.location.href = '/staff/check-in/' + token;
                        });
                    }
                },
                function () {}
            ).then(function () {
                statusEl.textContent = 'Quét QR trên màn hình khách...';
            }).catch(function () {
                statusEl.textContent = 'Không mở được camera - cho phép quyền hoặc nhập mã thủ công.';
            });
        });
    </script>
</section>
</html>
