<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      th:replace="~{staff/layout :: staffLayout(~{::section})}">
<section th:with="activeOpsNav='scan', pageTitle='Quét QR'">
    <div class="text-center mb-4">
        <h1 class="h4 fw-bold">Quét mã QR khách</h1>
        <p class="text-muted small">Hướng camera vào QR trên email hoặc mục "Vé của tôi".</p>
    </div>
    <div class="card border-0 shadow-sm mx-auto" style="max-width:480px;">
        <div class="card-body p-3">
            <div id="qr-reader" class="w-100 rounded overflow-hidden"></div>
            <p id="qr-status" class="small text-muted text-center mt-3 mb-0">Đang khởi động camera…</p>
        </div>
    </div>
    <div class="text-center mt-4">
        <p class="small text-muted">Hoặc nhập mã check-in thủ công:</p>
        <form th:action="@{/staff/check-in/manual}" method="get" class="d-flex gap-2 justify-content-center flex-wrap" onsubmit="return manualToken(event)">
            <input type="text" id="manualToken" class="form-control form-control-sm" style="max-width:280px;" placeholder="Dán mã hoặc URL check-in">
            <button type="submit" class="btn btn-sm btn-dark">Mở vé</button>
        </form>
    </div>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        function extractToken(text) {
            if (!text) return '';
            var t = text.trim();
            var m = t.match(/\/check-in\/([a-f0-9]+)/i);
            if (m) return m[1];
            return t.replace(/[^a-f0-9]/gi, '');
        }
        function manualToken(e) {
            e.preventDefault();
            var token = extractToken(document.getElementById('manualToken').value);
            if (token) window.location.href = '/staff/check-in/' + token;
            return false;
        }
        document.addEventListener('DOMContentLoaded', function () {
            var statusEl = document.getElementById('qr-status');
            if (!window.Html5Qrcode) {
                statusEl.textContent = 'Trình duyệt không hỗ trợ quét QR — dùng ô nhập mã bên dưới.';
                return;
            }
            var scanner = new Html5Qrcode('qr-reader');
            scanner.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                function (decoded) {
                    var token = extractToken(decoded);
                    if (token) {
                        scanner.stop().then(function () {
                            window.location.href = '/staff/check-in/' + token;
                        });
                    }
                },
                function () {}
            ).then(function () {
                statusEl.textContent = 'Quét QR trên màn hình khách…';
            }).catch(function () {
                statusEl.textContent = 'Không mở được camera — cho phép quyền hoặc nhập mã thủ công.';
            });
        });
    </script>
</section>
</html>
