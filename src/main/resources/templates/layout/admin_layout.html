<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | ZakiBooking Admin'"></title>

  <!-- Bootstrap 5 & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #FECF2F;
      --primary-dark: #000000;
      --sidebar-width: 260px;
      --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      --card-border-radius: 1rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
      color: #212529;
    }

    .admin-sidebar {
      width: var(--sidebar-width);
      min-height: calc(100vh - 80px);
      background: #fff;
    }

    .nav-link {
      color: #495057;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin: 0.2rem 0;
      transition: all 0.2s;
      font-weight: 500;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(254, 207, 47, 0.15);
      color: #000000;
    }

    .nav-link i {
      font-size: 1.1rem;
    }

    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border-radius: var(--card-border-radius);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1) !important;
    }

    .card {
      border: none;
      border-radius: var(--card-border-radius);
    }

    /* === Brand Color Overrides === */
    .bg-primary { background-color: #FECF2F !important; }
    .text-primary { color: #000000 !important; }
    .border-primary { border-color: #FECF2F !important; }
    .bg-primary.bg-opacity-10 { background-color: rgba(254, 207, 47, 0.1) !important; }

    .btn-primary {
      background-color: #FECF2F !important;
      border-color: #FECF2F !important;
      color: #000 !important;
    }
    .btn-primary:hover {
      background-color: #e6ba1a !important;
      border-color: #e6ba1a !important;
      color: #000 !important;
    }
    .btn-outline-primary {
      color: #FECF2F !important;
      border-color: #FECF2F !important;
    }
    .btn-outline-primary:hover {
      background-color: #FECF2F !important;
      color: #000 !important;
    }
    .btn-dark {
      background-color: #000000 !important;
      border-color: #000000 !important;
    }

    .page-item.active .page-link {
      background-color: #FECF2F;
      border-color: #FECF2F;
      color: #000;
    }
    .page-link:hover {
      background-color: rgba(254, 207, 47, 0.15);
      color: #000;
    }

    .form-control:focus, .form-select:focus {
      border-color: #FECF2F;
      box-shadow: 0 0 0 0.2rem rgba(254, 207, 47, 0.25);
    }

    a { color: #000000; }
    a:hover { color: #FECF2F; }

    .text-warning { color: #FECF2F !important; }
    .badge.bg-warning { background-color: #FECF2F !important; color: #000 !important; }
    .border-warning { border-color: #FECF2F !important; }

    /* === Dark Mode Toggle Button === */
    #darkModeToggle {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #darkModeToggle:hover { background: #e0e0e0; }

    /* === Dark Mode === */
    [data-theme="dark"] {
      --bg-body: #0B0B0B;
      --bg-card: #1A1A1A;
    }
    [data-theme="dark"] body { background-color: #0B0B0B; color: #F1F5F9; }
    [data-theme="dark"] .admin-sidebar { background: #111 !important; border-color: #222 !important; }
    [data-theme="dark"] .admin-header,
    [data-theme="dark"] .admin-header .border-bottom { background: #111 !important; border-color: #222 !important; }
    [data-theme="dark"] .card { background: #1A1A1A !important; border-color: #27272A !important; }
    [data-theme="dark"] .card-header { background: #1A1A1A !important; border-color: #333 !important; }
    [data-theme="dark"] .table { color: #F1F5F9; }
    [data-theme="dark"] .table thead { background: #222 !important; }
    [data-theme="dark"] .table thead th { background: #222 !important; color: #94A3B8 !important; }
    [data-theme="dark"] .table tbody tr:hover { background: #222 !important; }
    [data-theme="dark"] .text-dark { color: #F1F5F9 !important; }
    [data-theme="dark"] .text-muted { color: #94A3B8 !important; }
    [data-theme="dark"] .bg-white { background-color: #1A1A1A !important; }
    [data-theme="dark"] .bg-light { background-color: #222 !important; }
    [data-theme="dark"] .border-bottom { border-color: #222 !important; }
    [data-theme="dark"] .border-end { border-color: #222 !important; }
    [data-theme="dark"] .border-top { border-color: #222 !important; }
    [data-theme="dark"] .nav-link { color: #94A3B8; }
    [data-theme="dark"] .nav-link:hover,
    [data-theme="dark"] .nav-link.active { background: rgba(254, 207, 47, 0.12); color: #FECF2F; }
    [data-theme="dark"] .form-control,
    [data-theme="dark"] .form-select { background: #222; color: #F1F5F9; border-color: #333; }
    [data-theme="dark"] .input-group-text { background: #222; color: #94A3B8; border-color: #333; }
    [data-theme="dark"] .modal-content { background: #1A1A1A; color: #F1F5F9; border-color: #333; }
    [data-theme="dark"] .admin-footer { background: #111; border-color: #222 !important; }
    [data-theme="dark"] #darkModeToggle { background: #222; border-color: #444; color: #fff; }
    [data-theme="dark"] a { color: #F1F5F9; }
    [data-theme="dark"] a:hover { color: #FECF2F; }
    [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3,
    [data-theme="dark"] h4, [data-theme="dark"] h5, [data-theme="dark"] h6 { color: #F1F5F9; }
    [data-theme="dark"] .fw-bold { color: #F1F5F9; }
    [data-theme="dark"] .page-link { background: #1A1A1A; color: #F1F5F9; border-color: #333; }
    [data-theme="dark"] .badge.bg-dark { background-color: #333 !important; }
    [data-theme="dark"] .btn-outline-danger { color: #ff6b6b; border-color: #ff6b6b; }
    [data-theme="dark"] .btn-outline-danger:hover { background: #ff6b6b; color: #fff; }
  </style>
</head>
<header th:fragment="header()">
  <section class="admin-header w-100 px-0 py-0 border-bottom">
    <div class="d-flex justify-content-between align-items-center px-4">
      <div class="d-flex align-items-center gap-2">
        <img th:src="@{/favicon.icon}" alt="Logo" height="80" class="rounded">
        <h3 class="fw-bold mb-0 text-dark"></h3>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a th:href="@{/}" class="btn btn-dark btn-sm shadow-sm">
          <i class="bi bi-window me-1"></i>
          Client
        </a>
        <button id="darkModeToggle" title="Chuyển chế độ tối/sáng" class="ms-2">🌙</button>
        <form th:action="@{/logout}" method="post" class="mb-0">
          <button type="submit" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>
            Đăng xuất
          </button>
        </form>
      </div>
    </div>
  </section>
</header>
<nav th:fragment="nav()" class="admin-sidebar border-end bg-white">
  <ul class="nav flex-column px-3">
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin}">
        <i class="bi bi-speedometer2 me-2"></i>
        Dashboard
      </a>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin/user}">
        <i class="bi bi-people me-2"></i>
        Quản lý người dùng
      </a>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#tourMenu">
        <span>
          <i class="bi bi-airplane me-2"></i>
          Quản lý chuyến đi
        </span>
        <i class="bi bi-chevron-down small"></i>
      </a>
      <div class="collapse ps-3" id="tourMenu">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/tour/active}">
              <i class="bi bi-play-circle me-2 text-success"></i>
              Tour đang hoạt động
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/tour/completed}">
              <i class="bi bi-check-circle me-2 text-secondary"></i>
              Tour đã kết thúc
            </a>
          </li>
        </ul>
      </div>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin/contact}">
        <i class="bi bi-envelope me-2"></i>
        Quản lý liên hệ
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" th:href="@{/admin/danh-gia}">
        <i class="bi bi-star me-2"></i>
        Quản lý đánh giá
      </a>
    </li>
  </ul>
</nav>

<footer th:fragment="footer()" class="admin-footer mt-auto">
  <div class="container-fluid py-3 border-top">
    <div class="d-flex justify-content-center align-items-center small text-muted">
      © 2026 ZakiBooking Admin
    </div>
  </div>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function() {
      // === Dark Mode Toggle ===
      const toggle = document.getElementById('darkModeToggle');
      const html = document.documentElement;
      const saved = localStorage.getItem('zaki-admin-theme');
      if (saved === 'dark') {
        html.setAttribute('data-theme', 'dark');
        if (toggle) toggle.textContent = '☀️';
      }
      if (toggle) {
        toggle.addEventListener('click', function() {
          const isDark = html.getAttribute('data-theme') === 'dark';
          if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('zaki-admin-theme', 'light');
            toggle.textContent = '🌙';
          } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('zaki-admin-theme', 'dark');
            toggle.textContent = '☀️';
          }
        });
      }

      // === Active Sidebar Link ===
      const path = window.location.pathname;
      document.querySelectorAll('.admin-sidebar .nav-link').forEach(function(link) {
        const href = link.getAttribute('href');
        if (!href) return;
        // Exact match for /admin (dashboard)
        if (href === '/admin' && path === '/admin') {
          link.classList.add('active');
        }
        // Prefix match for other pages (e.g. /admin/user, /admin/tour/active)
        else if (href !== '/admin' && path.startsWith(href)) {
          link.classList.add('active');
          // Auto-expand parent collapse if inside a submenu
          var collapse = link.closest('.collapse');
          if (collapse) {
            collapse.classList.add('show');
          }
        }
      });
    })();
  </script>
</footer>
