<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | ZakiBooking Admin'"></title>

  <!-- Bootstrap 5 & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #0d6efd;
      --sidebar-width: 260px;
      --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      --card-border-radius: 1rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
      color: #212529;
    }

    .admin-sidebar {
      width: var(--sidebar-width);
      min-height: calc(100vh - 80px);
      background: #fff;
    }

    .nav-link {
      color: #495057;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin: 0.2rem 0;
      transition: all 0.2s;
      font-weight: 500;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(13, 110, 253, 0.1);
      color: var(--primary-color);
    }

    .nav-link i {
      font-size: 1.1rem;
    }

    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border-radius: var(--card-border-radius);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1) !important;
    }

    .card {
      border: none;
      border-radius: var(--card-border-radius);
    }
  </style>
</head>
<header th:fragment="header()">
  <section class="admin-header w-100 px-0 py-0 border-bottom">
    <div class="d-flex justify-content-between align-items-center px-4">
      <div class="d-flex align-items-center gap-2">
        <img th:src="@{/favicon.icon}" alt="Logo" height="80" class="rounded">
        <h3 class="fw-bold mb-0 text-dark"></h3>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a th:href="@{/}" class="btn btn-dark btn-sm shadow-sm">
          <i class="bi bi-window me-1"></i>
          Client
        </a>
        <button id="darkModeToggle" title="Chuyển chế độ tối/sáng" class="ms-2">🌙</button>
        <form th:action="@{/logout}" method="post" class="mb-0">
          <button type="submit" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>
            Đăng xuất
          </button>
        </form>
      </div>
    </div>
  </section>
</header>
<nav th:fragment="nav()" class="admin-sidebar border-end bg-white">
  <ul class="nav flex-column px-3">
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin}">
        <i class="bi bi-speedometer2 me-2"></i>
        Dashboard
      </a>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin/user}">
        <i class="bi bi-people me-2"></i>
        Quản lý người dùng
      </a>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#tourMenu">
        <span>
          <i class="bi bi-airplane me-2"></i>
          Quản lý chuyến đi
        </span>
        <i class="bi bi-chevron-down small"></i>
      </a>
      <div class="collapse ps-3" id="tourMenu">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/tour/active}">
              <i class="bi bi-play-circle me-2 text-success"></i>
              Tour đang hoạt động
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/tour/completed}">
              <i class="bi bi-check-circle me-2 text-secondary"></i>
              Tour đã kết thúc
            </a>
          </li>
        </ul>
      </div>
    </li>
    <li class="nav-item mb-1">
      <a class="nav-link" th:href="@{/admin/contact}">
        <i class="bi bi-envelope me-2"></i>
        Quản lý liên hệ
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" th:href="@{/admin/danh-gia}">
        <i class="bi bi-star me-2"></i>
        Quản lý đánh giá
      </a>
    </li>
  </ul>
</nav>

<footer th:fragment="footer()" class="admin-footer mt-auto">
  <div class="container-fluid py-3 border-top">
    <div class="d-flex justify-content-center align-items-center small text-muted">
      © 2026 ZakiBooking Admin
    </div>
  </div>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>
