
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/layout :: layout(~{::section})">
<section>
    <header class="hero-section text-center">
        <div class="container">
            <h1 id="typing-text">
                Bạn muốn đi đâu cùng <span class="brand-gradient">ZakiBooking?</span>
            </h1>
            <p class="lead hero-lead mx-auto">Khám phá hàng ngàn tour du lịch hấp dẫn với giá tốt nhất, kiến tạo những kỷ niệm vô giá cùng chúng tôi.</p>
        </div>
    </header>
    <section class="search-section py-4" id="homeSearch" style="margin-top: -60px; position: relative; z-index: 10;">
        <div class="container">
            <form class="search-card p-4 rounded-5 shadow-lg" method="GET" th:action="@{/tour}" autocomplete="off">
                <div class="row g-3 align-items-end">
                    <div class="col-lg-4">
                        <label class="search-field-label"><i class="bi bi-geo-alt-fill"></i> Bạn muốn đi đâu?</label>
                        <input type="text" class="form-control search-field-input" name="diemDen" placeholder="ví dụ: Đà Nẵng, Phú Quốc..." />
                    </div>
                    <div class="col-lg-3">
                        <label class="search-field-label"><i class="bi bi-calendar-event-fill"></i> Ngày đi</label>
                        <input type="date" class="form-control search-field-input" name="ngayDi" id="ngayDi" th:attr="min=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                    </div>  
                    <div class="col-lg-3">
                        <label class="search-field-label"><i class="bi bi-tag-fill"></i> Khoảng giá</label>
                        <select class="form-select search-field-input search-field-select" name="khoangGia">
                            <option value="">Tất cả mức giá</option>
                            <option value="DUOI5">Dưới 5 triệu</option>
                            <option value="5_10">5 - 10 triệu</option>
                            <option value="TREN10">Trên 10 triệu</option>
                        </select>
                    </div>
                    <div class="col-lg-2">
                        <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm fw-bold">
                            TÌM KIẾM
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <section class="py-5">
        <div class="container">
            <div class="d-flex align-items-end justify-content-between mb-5">
                <div>
                    <h6 class="text-primary fw-bold text-uppercase ls-wide">Explore</h6>
                    <h2 class="fw-800 mb-0" style="font-size: 2.5rem; letter-spacing: -0.02em;">Điểm đến nổi bật</h2>
                </div>
                <a th:href="@{/tour}" class="text-dark fw-bold text-decoration-none border-bottom border-2 border-primary pb-1">Xem tất cả</a>
            </div>
            <div class="row g-4">
                <div class="col-md-4" th:each="dd : ${dsNoiBat}">
                    <a th:href="@{/tour/{id}(id=${dd.id})}" class="text-decoration-none">
                        <div class="card h-100 group">
                            <div class="img-zoom" style="height: 300px;">
                                <img th:src="@{${dd.hinhAnh}}" class="w-100 h-100 object-cover" alt="">
                                <div class="card-img-overlay d-flex flex-column justify-content-end p-4" 
                                     style="background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);">
                                    <h4 class="text-white fw-bold mb-1" th:text="${dd.thanhPho}"></h4>
                                    <p class="text-white-50 mb-0 fs-7" th:text="${dd.chauLuc}"></p>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </section>
    <section class="bg-brand-light py-5">
        <div class="container text-center">
            <h2 class="fw-bold mb-4">Tour được yêu thích nhất</h2>
            <div class="row g-4">
                <div class="col-md-4" th:each="ds : ${dsnoibatcd}">
                    <div class="card border-0 shadow-sm h-100 rounded-4 overflow-hidden">
                        <div class="img-zoom">
                            <img th:src="@{${ds.hinhAnh}}" class="card-img-top" alt="" style="width:100%; height:250px; object-fit: cover;" />
                        </div>
                        <div class="card-body">
                            <h5 class="card-title fw-bold" th:text="${ds.tieuDe}"></h5>
                            <p th:text="${#numbers.formatDecimal(ds.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫'" class="fw-bold text-danger fs-5 mb-3" ></p>
                            <a th:href="@{/tour/{id}(id=${ds.id})}" class="btn btn-primary rounded-pill px-4">Xem chi tiết</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section class="py-5 text-center bg-light">
        <div class="container">
            <h2 class="fw-bold mb-4">Khách hàng nói gì?</h2>
            <div id="reviewCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000"
                 style="background: none !important;">
                <div class="carousel-inner" style="background: none !important;">
                    <!-- Lặp qua từng đánh giá để tạo slide -->
                    <div class="carousel-item" th:each="dsdg, iterStat : ${dsDanhGia}"
                         th:classappend="${iterStat.index == 0} ? 'active'"
                         style="background: none !important; color: #000;">
                        <a th:href="@{/tour/{id}(id=${dsdg.idChuyenDi.id})} " class="text-decoration-none">
                            <blockquote class="blockquote" style="background: none !important;">
                                <p class="mb-4 fw-bolder" style =" margin-bottom: 0px;"th:text="${dsdg.idChuyenDi.tieuDe} +':'"></p>
                                <p class="mb-4" style =" margin-bottom: 0px;"th:text="${dsdg.binhLuan}"></p>
                            <footer class="blockquote-footer"
                                    th:text="${dsdg.idNguoiDung.hoTen}"></footer>
                        </blockquote></a>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#reviewCarousel" data-bs-slide="prev"
                        style="background: transparent; border: none;">
                    <span class="text-dark fs-1" aria-hidden="true">‹</span>
                    <span class="visually-hidden">Trước</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#reviewCarousel" data-bs-slide="next"
                        style="background: transparent; border: none;">
                    <span class="text-dark fs-1" aria-hidden="true">›</span>
                    <span class="visually-hidden">Tiếp</span>
                </button>
            </div>
        </div>
    </section>
</section>
</html>
