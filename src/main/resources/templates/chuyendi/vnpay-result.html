<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout :: layout(~{::content})}">

<head>
    <meta charset="UTF-8">
    <title>Kết quả thanh toán</title>
</head>

<body>
    <th:block th:fragment="content">
        <div class="container py-5 mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow border-0">
                        <div class="card-body p-5 text-center">
                            <!-- Success Icon -->
                            <div th:if="${responseCode == '00'}" class="mb-4">
                                <div class="display-1 text-success mb-3">
                                    <i class="bi bi-check-circle-fill"></i>
                                </div>
                                <h2 class="fw-bold text-success">Thanh toán thành công!</h2>
                                <p class="text-muted">Cảm ơn bạn đã tin tưởng và sử dụng dịch vụ của ZakiBooking.</p>
                            </div>

                            <!-- Failure Icon -->
                            <div th:if="${responseCode != '00'}" class="mb-4">
                                <div class="display-1 text-danger mb-3">
                                    <i class="bi bi-x-circle-fill"></i>
                                </div>
                                <h2 class="fw-bold text-danger">Thanh toán thất bại</h2>
                                <p class="text-muted" th:text="${'Mã lỗi: ' + responseCode + ' - ' + message}">Thông báo
                                    lỗi</p>
                            </div>

                            <hr class="my-4">

                            <!-- Transaction Details -->
                            <div class="text-start mb-4 bg-light p-4 rounded">
                                <h5 class="fw-bold mb-3 border-bottom pb-2">Thông tin giao dịch</h5>
                                <div class="row mb-2">
                                    <div class="col-6 text-muted">Mã đơn hàng:</div>
                                    <div class="col-6 fw-bold" th:text="${orderId}">#123456</div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6 text-muted">Số tiền:</div>
                                    <div class="col-6 fw-bold text-primary"
                                        th:text="${#numbers.formatDecimal(amount / 100, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                        1,000,000 ₫</div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6 text-muted">Nội dung:</div>
                                    <div class="col-6" th:text="${orderInfo}">Thanh toán tour...</div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6 text-muted">Ngân hàng:</div>
                                    <div class="col-6" th:text="${bankCode}">NCB</div>
                                </div>
                                <div class="row">
                                    <div class="col-6 text-muted">Thời gian:</div>
                                    <div class="col-6" th:text="${payDate}">2025-01-01</div>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-block">
                                <a th:href="@{/tour}" class="btn btn-outline-primary px-4 me-md-2">Tiếp tục xem tour</a>
                                <a th:href="@{/user/bookings}" class="btn btn-primary px-4">Lịch sử đặt chỗ</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</body>

</html>
