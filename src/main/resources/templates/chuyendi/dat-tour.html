<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout :: layout(~{::content})}"
    xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title th:text="'Đặt tour - ' + ${tour.tieuDe}">Đặt tour</title>
</head>

<body>
    <th:block th:fragment="content">
        <div class="container pt-5" style="margin-top: 30px;">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb small">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/tour}" class="text-decoration-none">Tour</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/tour/{id}(id=${tour.id})}" class="text-decoration-none"
                            th:text="${tour.tieuDe}">Tour</a></li>
                    <li class="breadcrumb-item active">Đặt tour</li>
                </ol>
            </nav>

            <div class="row">
                <!-- Form bên trái -->
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-primary text-white py-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-person-lines-fill me-2"></i>THÔNG TIN LIÊN LẠC</h5>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/booking/submit}" method="post" id="bookingForm">
                                <input type="hidden" name="tourId" th:value="${tour.id}">
                                <input type="hidden" name="nkhId" th:value="${nkh.id}">

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Họ và tên <span
                                                class="text-danger">*</span></label>
                                        <input type="text" name="hoTen" class="form-control"
                                            placeholder="Nhập họ và tên" th:value="${userHoTen}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Email <span
                                                class="text-danger">*</span></label>
                                        <input type="email" name="email" class="form-control" placeholder="Nhập email"
                                            th:value="${userEmail}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Số điện thoại <span
                                                class="text-danger">*</span></label>
                                        <input type="tel" name="soDienThoai" class="form-control"
                                            placeholder="Nhập số điện thoại" th:value="${userSoDienThoai}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Số lượng khách <span
                                                class="text-danger">*</span></label>
                                        <input type="number" name="soLuong" class="form-control" value="1" min="1"
                                            max="20" required id="soLuongInput">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold">Địa chỉ</label>
                                        <input type="text" name="diaChi" class="form-control"
                                            placeholder="Nhập địa chỉ">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold">Ghi chú</label>
                                        <textarea name="ghiChu" class="form-control" rows="3"
                                            placeholder="Yêu cầu đặc biệt..."></textarea>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Thông tin chuyến bay -->
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-info text-white py-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-airplane me-2"></i>THÔNG TIN CHUYẾN BAY</h5>
                        </div>
                        <div class="card-body p-0">
                            <!-- Chiều đi -->
                            <div class="p-4 border-bottom">
                                <div class="d-flex align-items-center mb-3">
                                    <span class="badge bg-success me-2 px-3 py-2">CHIỀU ĐI</span>
                                    <span class="text-muted small"
                                        th:text="'Ngày ' + ${#temporals.format(nkh.ngay, 'dd/MM/yyyy')}"></span>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-3 text-center">
                                        <div class="fs-3 fw-bold text-dark" th:text="${nkh.gioBayDi ?: 'N/A'}"></div>
                                        <div class="small text-muted">HAN - Hà Nội</div>
                                    </div>
                                    <div class="col-md-6 text-center">
                                        <div class="d-flex align-items-center justify-content-center">
                                            <hr class="flex-grow-1">
                                            <i class="bi bi-airplane-fill text-primary mx-3 fs-5"></i>
                                            <hr class="flex-grow-1">
                                        </div>
                                        <div class="small text-muted" th:text="${nkh.maChuyenBayDi ?: 'N/A'}"></div>
                                    </div>
                                    <div class="col-md-3 text-center">
                                        <div class="fs-3 fw-bold text-dark" th:text="${nkh.gioDenDi ?: 'N/A'}"></div>
                                        <div class="small text-muted">SGN - TP.HCM</div>
                                    </div>
                                </div>
                                <div class="text-end mt-2">
                                    <span class="text-danger fw-bold"
                                        th:text="${nkh.giaVeDi != null ? #numbers.formatDecimal(nkh.giaVeDi, 0, 'COMMA', 0, 'POINT') + ' VND' : 'N/A'}"></span>
                                </div>
                            </div>

                            <!-- Chiều về -->
                            <div class="p-4">
                                <div class="d-flex align-items-center mb-3">
                                    <span class="badge bg-warning text-dark me-2 px-3 py-2">CHIỀU VỀ</span>
                                    <span class="text-muted small"
                                        th:text="${nkh.ngayVe != null ? 'Ngày ' + #temporals.format(nkh.ngayVe, 'dd/MM/yyyy') : ''}"></span>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-3 text-center">
                                        <div class="fs-3 fw-bold text-dark" th:text="${nkh.gioBayVe ?: 'N/A'}"></div>
                                        <div class="small text-muted">SGN - TP.HCM</div>
                                    </div>
                                    <div class="col-md-6 text-center">
                                        <div class="d-flex align-items-center justify-content-center">
                                            <hr class="flex-grow-1">
                                            <i class="bi bi-airplane-fill text-primary mx-3 fs-5"
                                                style="transform: scaleX(-1);"></i>
                                            <hr class="flex-grow-1">
                                        </div>
                                        <div class="small text-muted" th:text="${nkh.maChuyenBayVe ?: 'N/A'}"></div>
                                    </div>
                                    <div class="col-md-3 text-center">
                                        <div class="fs-3 fw-bold text-dark" th:text="${nkh.gioDenVe ?: 'N/A'}"></div>
                                        <div class="small text-muted">HAN - Hà Nội</div>
                                    </div>
                                </div>
                                <div class="text-end mt-2">
                                    <span class="text-danger fw-bold"
                                        th:text="${nkh.giaVeVe != null ? #numbers.formatDecimal(nkh.giaVeVe, 0, 'COMMA', 0, 'POINT') + ' VND' : 'N/A'}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar bên phải -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 sticky-price-box">
                        <div class="card-header bg-white py-3 border-bottom">
                            <h6 class="fw-bold mb-0 text-primary" th:text="${tour.tieuDe}"></h6>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small"><i class="bi bi-geo-alt me-1"></i> Điểm đón:</span>
                                <strong class="small"
                                    th:text="${tour.idDiemDon != null ? tour.idDiemDon.ten : 'Hà Nội'}"></strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small"><i class="bi bi-calendar3 me-1"></i> Ngày đi:</span>
                                <strong class="small" th:text="${#temporals.format(nkh.ngay, 'dd/MM/yyyy')}"></strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small"><i class="bi bi-calendar3 me-1"></i> Ngày về:</span>
                                <strong class="small"
                                    th:text="${nkh.ngayVe != null ? #temporals.format(nkh.ngayVe, 'dd/MM/yyyy') : 'N/A'}"></strong>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small">Giá dịch vụ tour:</span>
                                <span class="small fw-bold"
                                    th:text="${#numbers.formatDecimal(tour.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small">Vé máy bay (đi):</span>
                                <span class="small fw-bold"
                                    th:text="${nkh.giaVeDi != null ? #numbers.formatDecimal(nkh.giaVeDi, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'N/A'}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="small">Vé máy bay (về):</span>
                                <span class="small fw-bold"
                                    th:text="${nkh.giaVeVe != null ? #numbers.formatDecimal(nkh.giaVeVe, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'N/A'}"></span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between mb-1">
                                <span class="fw-bold">Giá/khách:</span>
                                <span class="text-danger fw-bold"
                                    th:text="${#numbers.formatDecimal(tongGia, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-3" id="totalLine">
                                <span class="fw-bold fs-5">TỔNG CỘNG:</span>
                                <span class="text-danger fw-bold fs-5" id="totalPrice"
                                    th:text="${#numbers.formatDecimal(tongGia, 0, 'COMMA', 0, 'POINT')} + ' ₫'"
                                    th:data-unit-price="${tongGia}"></span>
                            </div>

                            <button type="submit" form="bookingForm" class="btn btn-danger w-100 py-3 fw-bold fs-5">
                                <i class="bi bi-check-circle me-2"></i> XÁC NHẬN ĐẶT TOUR
                            </button>

                            <div class="mt-3 text-center">
                                <a th:href="@{/tour/{id}(id=${tour.id}, selectedDate=${nkh.ngay}, month=${nkh.thang}, year=${nkh.nam})}"
                                    class="text-decoration-none small text-muted">
                                    <i class="bi bi-arrow-left me-1"></i> Quay lại chi tiết tour
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Cập nhật tổng giá khi thay đổi số lượng khách
            document.getElementById('soLuongInput').addEventListener('change', function () {
                var unitPrice = parseFloat(document.getElementById('totalPrice').getAttribute('data-unit-price'));
                var soLuong = parseInt(this.value) || 1;
                var total = unitPrice * soLuong;
                document.getElementById('totalPrice').textContent = total.toLocaleString('vi-VN') + ' ₫';
            });
        </script>
    </th:block>
</body>

</html>
