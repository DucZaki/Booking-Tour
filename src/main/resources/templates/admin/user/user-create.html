<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/admin_layout :: head('Add User')}"></head>
<body>
<header th:replace="~{layout/admin_layout :: header()}"></header>
<div class="d-flex">
    <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4>Add New User</h4>
            </div>
            <div class="card-body">
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                <form th:action="@{/admin/user/save}" method="post" enctype="multipart/form-data" th:object="${users}" autocomplete="off">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" th:field="*{tenDangNhap}" class="form-control" placeholder="Nhập tên đăng nhập..." required minlength="3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{hoTen}" class="form-control" placeholder="Nhập họ tên người dùng..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{matKhau}" class="form-control" placeholder="Nhập password..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" th:field="*{number}" class="form-control" placeholder="0901234567" required
                                   pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
                                   title="Số điện thoại phải đúng 10 chữ số">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Quyền</label>
                            <select th:field="*{vaiTro}" class="form-select" required>
                                <option value="USER">USER</option>
                                <option value="GUIDE">GUIDE (HDV / Điều hành)</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 d-flex justify-content-end">
                        <a href="/admin/user" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
</html>
