<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/admin_layout :: head('Quản lý người dùng')}"></head>

<body>
<header th:replace="~{layout/admin_layout:: header()}"></header>
<div class="d-flex">
    <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
    <main class="flex-grow-1 p-4" style="min-height: calc(100vh - 80px);">
        <div class="container-fluid">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                <h2 class="fw-bold mb-0">Quản lý người dùng</h2>
                <form th:action="@{/admin/user}" method="get" class="d-flex flex-wrap align-items-center gap-2">
                    <input type="hidden" name="page" value="0">
                    <div class="input-group" style="min-width: 280px;">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0" name="q"
                               placeholder="Tìm theo tên, email, username, ID..."
                               th:value="${keyword}">
                    </div>
                    <select class="form-select form-select-sm" name="sort" style="width: 220px;" onchange="this.form.submit()">
                        <option value="spending_desc" th:selected="${sort == 'spending_desc'}">Chi tiêu cao → thấp</option>
                        <option value="spending_asc" th:selected="${sort == 'spending_asc'}">Chi tiêu thấp → cao</option>
                        <option value="bookings_desc" th:selected="${sort == 'bookings_desc'}">Nhiều booking nhất</option>
                        <option value="name_asc" th:selected="${sort == 'name_asc'}">Tên A → Z</option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm px-3">
                        <i class="bi bi-search me-1"></i> Tìm kiếm
                    </button>
                    <a th:if="${keyword != null and !keyword.isEmpty()}" th:href="@{/admin/user(sort=${sort})}"
                       class="btn btn-outline-secondary btn-sm">Xóa lọc</a>
                </form>
            </div>

            <div th:if="${keyword != null and !keyword.isEmpty()}" class="alert alert-light border small py-2 mb-3">
                Kết quả cho: <strong th:text="'“' + ${keyword} + '”'"></strong>
                — sắp xếp theo chi tiêu / tiêu chí đã chọn
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="px-4 py-3">Người dùng</th>
                                <th class="py-3">Liên hệ</th>
                                <th class="py-3 text-center">Vai trò</th>
                                <th class="py-3 text-center">Booking PAID</th>
                                <th class="py-3 text-end">Tổng chi tiêu</th>
                                <th class="py-3">Ngày tham gia</th>
                                <th class="py-3 text-center">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td class="px-4 py-3">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="rounded-circle bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center fw-bold"
                                             style="width: 40px; height: 40px;"
                                             th:text="${#strings.substring(u.hoTen() != null and !u.hoTen().isEmpty() ? u.hoTen() : 'U', 0, 1)}">
                                        </div>
                                        <div>
                                            <div class="fw-bold" th:text="${u.hoTen()}"></div>
                                            <div class="text-muted small" th:text="'ID: #' + ${u.id()}"></div>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-3">
                                    <div class="small fw-semibold" th:text="${u.email()}"></div>
                                    <div class="text-muted small" th:text="${u.phone() != null ? u.phone() : '-'}"></div>
                                </td>
                                <td class="py-3 text-center">
                                    <span th:classappend="${u.vaiTro() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                          class="badge rounded-pill px-3 py-1" th:text="${u.vaiTro()}"></span>
                                </td>
                                <td class="py-3 text-center fw-bold" th:text="${u.paidBookings()}"></td>
                                <td class="py-3 text-end fw-bold text-success"
                                    th:text="${#numbers.formatDecimal(u.totalSpending(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                <td class="py-3 text-muted small" th:text="${u.ngayThamGia()}"></td>
                                <td class="py-3 text-center">
                                    <a th:href="@{'/admin/user/' + ${u.id()}}" class="btn btn-sm btn-outline-dark rounded-pill">
                                        Hồ sơ
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    Không tìm thấy người dùng phù hợp.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:if="${totalPage > 0}" aria-label="Page navigation">
                <ul class="pagination justify-content-center mt-4">
                    <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/user(page=${page - 1}, perPage=${perPage}, q=${keyword}, sort=${sort})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPage - 1)}"
                        th:classappend="${i == page} ? 'active'">
                        <a class="page-link"
                           th:href="@{/admin/user(page=${i}, perPage=${perPage}, q=${keyword}, sort=${sort})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${page >= totalPage - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/user(page=${page + 1}, perPage=${perPage}, q=${keyword}, sort=${sort})}">&raquo;</a>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
</html>
