<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/admin_layout :: head('Admin')}"></head>

<body>
<header th:replace="~{layout/admin_layout:: header()}"></header>
<div class="d-flex">
    <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
    <div class="container mt-4">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-3">Danh sách người dùng</h3>
                <a href="/admin/user/create" class="btn btn-dark">
                    <i class="bi bi-plus-circle"></i> Thêm người dùng
                </a>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>Tên đăng nhập</th>
                            <th>Họ và tên</th>
                            <th>Email</th>
                            <th>Ngày tạo</th>
                            <th>Quyền</th>
                            <th>Số điện thoại</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.tenDangNhap}"></td>
                            <td th:text="${user.hoTen}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${#temporals.format(user.ngayTao, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${user.vaiTro}"></span>
                            </td>
                            <td th:text="${user.number}"></td>
                            <td class="text-center">
                                <a th:href="@{'/admin/user/' + ${user.id}}" class="btn btn-sm btn-success">Info</a>
                                <a th:href="@{'/admin/user/edit/' + ${user.id}}" class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{'/admin/user/delete/' + ${user.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                Không có người dùng nào.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div aria-label="Page navigation">
                <ul class="pagination justify-content-center mt-4">
                    <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/user(page=${page - 1}, perPage=${perPage})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPage - 1)}" th:classappend="${i == page} ? 'active'">
                        <a class="page-link" th:href="@{/admin/user(page=${i}, perPage=${perPage})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${page == totalPage - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/user(page=${page + 1}, perPage=${perPage})}">&raquo;</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
</html>
