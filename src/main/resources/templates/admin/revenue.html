<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head('Chi tiết Doanh thu')}"></head>
<body>
    <div th:replace="~{layout/admin_layout :: header()}"></div>
    <div class="d-flex">
        <div th:replace="~{layout/admin_layout :: nav()}"></div>
        <main class="flex-grow-1 p-4" style="min-height: calc(100vh - 80px);">
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a th:href="@{/admin}" class="btn btn-sm btn-outline-dark mb-2">
                            <i class="bi bi-arrow-left"></i> Quay lại Dashboard
                        </a>
                        <h2 class="fw-bold mb-0">Thống kê Doanh thu</h2>
                    </div>
                    <div class="text-end">
                        <h3 class="text-success fw-bold mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></h3>
                        <span class="text-muted small">Tổng doanh thu hệ thống (PAID)</span>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <ul class="nav nav-pills" id="revenueTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="month-tab" data-bs-toggle="pill" data-bs-target="#month" type="button" role="tab">Theo Tháng</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="week-tab" data-bs-toggle="pill" data-bs-target="#week" type="button" role="tab">Theo Tuần</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="year-tab" data-bs-toggle="pill" data-bs-target="#year" type="button" role="tab">Theo Năm</button>
                            </li>
                        </ul>
                        <form th:action="@{/admin/revenue}" method="get" class="d-flex gap-2">
                            <select name="year" class="form-select form-select-sm" style="width: 150px;">
                                <option value="2026" th:selected="${selectedYear == 2026}">Năm 2026</option>
                                <option value="2025" th:selected="${selectedYear == 2025}">Năm 2025</option>
                                <option value="2024" th:selected="${selectedYear == 2024}">Năm 2024</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Lọc</button>
                        </form>
                    </div>
                    <div class="card-body p-4">
                        <div class="tab-content" id="revenueTabsContent">
                            <!-- Theo Tháng -->
                            <div class="tab-pane fade show active" id="month" role="tabpanel">
                                <div class="row">
                                    <div class="col-lg-8">
                                        <canvas id="monthlyChartLine" style="height: 400px;"></canvas>
                                    </div>
                                    <div class="col-lg-4">
                                        <div class="table-responsive" style="max-height: 700px; overflow-y: auto;">
                                            <table class="table table-hover">
                                                <thead class="sticky-top bg-white">
                                                    <tr>
                                                        <th>Tháng</th>
                                                        <th class="text-end">Doanh thu</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr th:each="row : ${monthlyRevenue}">
                                                        <td>
                                                            <div class="fw-bold" th:text="'Tháng ' + ${row[0]}"></div>
                                                            <div class="small text-muted" th:text="'Năm ' + ${selectedYear}"></div>
                                                        </td>
                                                        <td class="text-end fw-bold text-dark" th:text="${#numbers.formatDecimal(row[1], 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Theo Tuần -->
                            <div class="tab-pane fade" id="week" role="tabpanel">
                                <div class="row">
                                    <div class="col-lg-8">
                                        <canvas id="weeklyChart" style="height: 400px;"></canvas>
                                    </div>
                                    <div class="col-lg-4">
                                        <div class="table-responsive" style="max-height: 700px; overflow-y: auto;">
                                            <table class="table table-hover">
                                                <thead class="sticky-top bg-white">
                                                    <tr>
                                                        <th>Tuần</th>
                                                        <th class="text-end">Doanh thu</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr th:each="row : ${weeklyRevenue}">
                                                        <td>
                                                            <div class="fw-bold" th:text="'Tuần ' + ${row[0]}"></div>
                                                            <div class="small text-muted" th:text="'Năm ' + ${selectedYear}"></div>
                                                        </td>
                                                        <td class="text-end fw-bold text-dark" th:text="${#numbers.formatDecimal(row[1], 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Theo Năm -->
                            <div class="tab-pane fade" id="year" role="tabpanel">
                                <div class="row">
                                    <div class="col-lg-8">
                                        <canvas id="yearlyChart" style="height: 400px;"></canvas>
                                    </div>
                                    <div class="col-lg-4">
                                        <div class="table-responsive" style="max-height: 700px; overflow-y: auto;">
                                            <table class="table table-hover">
                                                <thead class="sticky-top bg-white">
                                                    <tr>
                                                        <th>Năm</th>
                                                        <th class="text-end">Doanh thu</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr th:each="row : ${yearlyRevenue}">
                                                        <td>
                                                            <div class="fw-bold" th:text="'Năm ' + ${row[0]}"></div>
                                                            <div class="small text-muted">Tổng hợp</div>
                                                        </td>
                                                        <td class="text-end fw-bold text-dark" th:text="${#numbers.formatDecimal(row[1], 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="fw-bold mb-0">Chi tiết giao dịch gần đây</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="px-4 py-3 border-0">ID</th>
                                        <th class="py-3 border-0">Khách hàng</th>
                                        <th class="py-3 border-0">Tour</th>
                                        <th class="py-3 border-0 text-end">Số tiền</th>
                                        <th class="py-3 border-0">Ngày</th>
                                        <th class="py-3 border-0 text-center">Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Here we can reuse the same model attribute for bookings if we pass it, 
                                         but for MVP we'll show a message or just use the existing weekly/monthly tables.
                                         To be thorough, I'll update the controller to pass 'bookings' to revenue.html too. -->
                                    <tr th:each="row : ${bookings}">
                                        <td class="px-4 py-3 text-muted fw-bold" th:text="'#' + ${row[0]}"></td>
                                        <td class="py-3">
                                            <a th:if="${row[8] != null}" th:href="@{/admin/user/{id}(id=${row[8]})}" th:text="${row[1]}" class="text-decoration-none text-dark fw-bold border-bottom border-warning"></a>
                                            <span th:if="${row[8] == null}" th:text="${row[1] ?: 'Khách vãng lai'}"></span>
                                        </td>
                                        <td class="py-3 fw-bold text-dark" th:text="${row[3]}"></td>
                                        <td class="py-3 text-end fw-bold text-success" th:text="${#numbers.formatDecimal(row[5], 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                        <td class="py-3 small text-muted" th:text="${row[6]}"></td>
                                        <td class="py-3 text-center">
                                            <span th:classappend="${row[7] == 'PAID' ? 'bg-success' : 'bg-danger'}" class="badge rounded-pill" th:text="${row[7]}"></span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div th:replace="~{layout/admin_layout :: footer()}"></div>

    <script th:inline="javascript">
        const weeklyLabels = /*[[${weeklyLabels}]]*/ [];
        const weeklyData = /*[[${weeklyData}]]*/ [];
        const monthlyLabels = /*[[${monthlyLabels}]]*/ [];
        const monthlyData = /*[[${monthlyData}]]*/ [];
        const yearlyLabels = /*[[${yearlyLabels}]]*/ [];
        const yearlyData = /*[[${yearlyData}]]*/ [];

        const revenueCharts = {};

        function createRevenueLineChart(canvasId, labels, data) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return null;
            return new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Doanh thu (₫)',
                        data: data,
                        borderColor: '#FECF2F',
                        backgroundColor: 'rgba(254, 207, 47, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: labels.length > 20 ? 2 : 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#FECF2F',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => ' ' + Number(ctx.raw).toLocaleString('vi-VN') + ' ₫'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { borderDash: [5, 5], color: 'rgba(0,0,0,0.06)' },
                            ticks: {
                                callback: v => Number(v).toLocaleString('vi-VN') + ' ₫'
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxTicksLimit: labels.length > 20 ? 12 : labels.length,
                                maxRotation: 0,
                                autoSkip: true
                            }
                        }
                    }
                }
            });
        }

        function ensureChart(key, canvasId, labels, data) {
            if (revenueCharts[key]) {
                revenueCharts[key].resize();
                return;
            }
            revenueCharts[key] = createRevenueLineChart(canvasId, labels, data);
        }

        document.addEventListener('DOMContentLoaded', () => {
            ensureChart('month', 'monthlyChartLine', monthlyLabels, monthlyData);

            const weekTab = document.getElementById('week-tab');
            const yearTab = document.getElementById('year-tab');
            if (weekTab) {
                weekTab.addEventListener('shown.bs.tab', () => {
                    ensureChart('week', 'weeklyChart', weeklyLabels, weeklyData);
                });
            }
            if (yearTab) {
                yearTab.addEventListener('shown.bs.tab', () => {
                    ensureChart('year', 'yearlyChart', yearlyLabels, yearlyData);
                });
            }
        });
    </script>
</body>
</html>
