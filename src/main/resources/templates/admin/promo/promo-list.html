<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/admin_layout :: head('Mã giảm giá')}"></head>
<body>
<header th:replace="~{layout/admin_layout :: header()}"></header>
<div class="d-flex">
    <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Quản lý mã giảm giá</h2>
            <a th:href="@{/admin/promo/create}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-plus-lg me-1"></i> Thêm mã
            </a>
        </div>
        <div th:if="${success}" class="alert alert-success">Lưu thành công!</div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="bg-light">
                    <tr>
                        <th class="px-4">Mã</th>
                        <th>Loại</th>
                        <th>Giá trị</th>
                        <th>Áp dụng</th>
                        <th>Hiệu lực</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${promos}">
                        <td class="px-4 fw-bold" th:text="${p.ma}"></td>
                        <td th:text="${p.loaiGiam == 'FIXED' ? 'Số tiền' : '%'}"></td>
                        <td>
                            <span th:if="${p.loaiGiam == 'FIXED' and p.giaTriGiam != null}" th:text="${#numbers.formatDecimal(p.giaTriGiam, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                            <span th:if="${p.loaiGiam != 'FIXED' and p.giaTriGiam != null}" th:text="${p.giaTriGiam} + '%'"></span>
                            <span th:if="${p.giaTriGiam == null and p.phanTramGiam != null}" th:text="${p.phanTramGiam} + '%'"></span>
                        </td>
                        <td>
                            <span th:if="${p.apDungTatCa}">Tất cả tour</span>
                            <span th:unless="${p.apDungTatCa}" th:text="${p.tourIds != null ? p.tourIds.size() : 0} + ' tour'"></span>
                        </td>
                        <td>
                            <span th:text="${(p.ngayBatDau != null ? p.ngayBatDau : '—') + ' → ' + (p.ngayKetThuc != null ? p.ngayKetThuc : '—')}"></span>
                            <span th:if="${(p.ngayBatDau != null and today.isBefore(p.ngayBatDau)) or (p.ngayKetThuc != null and today.isAfter(p.ngayKetThuc))}" class="badge bg-secondary ms-1">Hết hạn</span>
                            <span th:unless="${(p.ngayBatDau != null and today.isBefore(p.ngayBatDau)) or (p.ngayKetThuc != null and today.isAfter(p.ngayKetThuc))}" class="badge bg-success ms-1">Active</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/promo/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">Sửa</a>
                            <a th:href="@{/admin/promo/delete/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Xóa mã này?')">Xóa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
</html>
