<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/admin_layout :: head('Admin')}"></head>

<body>
<header th:replace="~{layout/admin_layout:: header()}"></header>
<div class="d-flex">
  <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
  <div class="container mt-4">
    <h3 class="mb-3">Danh sách liên hệ</h3>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
          <tr>
            <th>Họ tên</th>
            <th>Loại</th>
            <th>Email</th>
            <th>Số khách</th>
            <th>Ngày gửi</th>
            <th>Trạng thái</th>
            <th class="text-center">Hành động</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="c : ${contacts}">
            <td th:text="${c.name}"></td>
            <td>
              <span class="badge bg-info text-dark" th:text="${c.type}"></span>
            </td>
            <td th:text="${c.email}"></td>
            <td>
              <span class="badge bg-secondary" th:text="${c.guest_number}"></span>
            </td>
            <td th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}"></td>
            <td>
              <span th:if="${c.status == 'NEW'}" class="badge bg-danger">Mới</span>
              <span th:if="${c.status == 'READ'}" class="badge bg-success">Đã đọc</span>
            </td>
            <td class="text-center">
              <a th:href="@{'/admin/contact/' + ${c.id}}" class="btn btn-sm btn-primary">Xem</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(contacts)}">
            <td colspan="7" class="text-center text-muted py-4">Không có liên hệ nào.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div aria-label="Page navigation" th:if="${totalPage > 0}">
      <ul class="pagination justify-content-center mt-4">
        <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
          <a class="page-link" th:href="@{/admin/contact(page=${page - 1}, perPage=${perPage})}">&laquo;</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPage - 1)}" th:classappend="${i == page} ? 'active'">
          <a class="page-link" th:href="@{/admin/contact(page=${i}, perPage=${perPage})}" th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${page == totalPage - 1} ? 'disabled'">
          <a class="page-link" th:href="@{/admin/contact(page=${page + 1}, perPage=${perPage})}">&raquo;</a>
        </li>
      </ul>
    </div>
  </div>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
