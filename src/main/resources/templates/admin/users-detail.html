<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin_layout :: head('Quản lý Người dùng chi tiết')}"></head>
<body>
    <div th:replace="~{layout/admin_layout :: header()}"></div>
    <div class="d-flex">
        <div th:replace="~{layout/admin_layout :: nav()}"></div>
        <main class="flex-grow-1 p-4" style="min-height: calc(100vh - 80px);">
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a th:href="@{/admin}" class="btn btn-sm btn-outline-dark mb-2">
                            <i class="bi bi-arrow-left"></i> Quay lại Dashboard
                        </a>
                        <h2 class="fw-bold mb-0">Quản lý Người dùng hệ thống</h2>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Tìm kiếm người dùng...">
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="px-4 py-3">Người dùng</th>
                                        <th class="py-3">Liên hệ</th>
                                        <th class="py-3 text-center">Vai trò</th>
                                        <th class="py-3 text-center">Số booking</th>
                                        <th class="py-3 text-end">Tổng chi tiêu</th>
                                        <th class="py-3">Ngày tham gia</th>
                                        <th class="py-3 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="row : ${users}">
                                        <td class="px-4 py-3">
                                            <div class="d-flex align-items-center gap-3">
                                                <div class="rounded-circle bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center fw-bold"
                                                     style="width: 40px; height: 40px;"
                                                     th:text="${#strings.substring(row[1] ?: 'U', 0, 1)}">
                                                </div>
                                                <div>
                                                    <div class="fw-bold" th:text="${row[1]}"></div>
                                                    <div class="text-muted small" th:text="'ID: #' + ${row[0]}"></div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="py-3">
                                            <div class="small fw-semibold" th:text="${row[2]}"></div>
                                            <div class="text-muted small" th:text="${row[3] ?: '-'}"></div>
                                        </td>
                                        <td class="py-3 text-center">
                                            <span th:classappend="${row[4] == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                                  class="badge rounded-pill px-3 py-1" th:text="${row[4]}"></span>
                                        </td>
                                        <td class="py-3 text-center fw-bold" th:text="${row[6] ?: 0}"></td>
                                        <td class="py-3 text-end fw-bold text-success" th:text="${row[7] != null ? #numbers.formatDecimal(row[7], 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}"></td>
                                        <td class="py-3 text-muted small" th:text="${#temporals.format(row[5], 'dd/MM/yyyy')}"></td>
                                        <td class="py-3 text-center">
                                            <a th:href="@{'/admin/user/' + ${row[0]}}" class="btn btn-sm btn-outline-dark rounded-pill">
                                                Hồ sơ
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div th:replace="~{layout/admin_layout :: footer()}"></div>
</body>
</html>
