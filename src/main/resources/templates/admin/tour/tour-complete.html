<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/admin_layout :: head('Admin')}"></head>

<body>
<header th:replace="~{layout/admin_layout:: header()}"></header>
<div class="d-flex">
  <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-3 fw-bold">Danh sách chuyến đi đã kết thúc</h3>
    </div>
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-4">
      <div class="col" th:each="t : ${tour}">
        <a class="tour-card" th:href="@{/admin/tour/detail/{id}(id=${t.id},source='completed')}"
           onclick="sessionStorage.removeItem('tourTab')">
          <div class="card h-100 border-0 shadow-sm tour-card">
            <img th:src="@{${t.hinhAnh}}" class="card-img-top" style="height: 230px; object-fit: cover;" alt="Tour picture">
            <div class="card-body text-center">
              <h6 class="fw-bold mb-2" th:text="${t.tieuDe}"></h6>
              <p class="text-danger fw-bold mb-0"
                 th:text="${#numbers.formatDecimal(t.gia, 0, 'COMMA', 0, 'POINT')} + ' VND'">
              </p>
              <a th:href="@{/admin/tour/extend/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary mt-2">
                Gia hạn
              </a>
            </div>
          </div>
        </a>
      </div>
      <div th:if="${#lists.isEmpty(tour)}" class="col-12 text-center text-muted py-4">
        Không có chuyến đi nào.
      </div>
    </div>
    <div aria-label="Page navigation">
      <ul class="pagination justify-content-center mt-4">
        <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
          <a class="page-link" th:href="@{/admin/tour/completed(page=${page - 1}, perPage=${perPage})}">&laquo;</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPage > 0 ? totalPage - 1 : 0)}" th:classappend="${i == page} ? 'active'">
          <a class="page-link" th:href="@{/admin/tour/completed(page=${i}, perPage=${perPage})}" th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${page == totalPage - 1} ? 'disabled'">
          <a class="page-link" th:href="@{/admin/tour/completed(page=${page + 1}, perPage=${perPage})}">&raquo;</a>
        </li>
      </ul>
    </div>
  </div>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
