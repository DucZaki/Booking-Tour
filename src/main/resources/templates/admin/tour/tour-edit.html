<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout/admin_layout :: head('Admin')}"></head>

<body>
    <header th:replace="~{layout/admin_layout:: header()}"></header>
    <div class="d-flex">
        <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
        <div class="container mt-4">
            <h3 class="fw-bold text-primary mb-3">Cập nhật chuyến đi</h3>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:action="@{'/admin/tour/update/' + ${tour.id}}" th:object="${tour}" method="post"
                enctype="multipart/form-data" class="shadow p-4 rounded bg-light">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tiêu đề</label>
                        <input type="text" th:field="*{tieuDe}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Giá cả</label>
                        <input type="text" th:field="*{gia}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Sức chứa mặc định / đợt</label>
                        <input type="number" th:field="*{sucChuaMacDinh}" class="form-control" min="1" max="500" required>
                        <small class="text-muted">Áp dụng cho ngày KH mới; có thể chỉnh từng ngày ở mục Ngày khởi hành.</small>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Ngày khởi hành</label>
                        <input type="text" th:field="*{ngayKhoiHanh}" class="form-control zaki-date"
                               th:attr="data-min=${tour.id == null ? #temporals.format(#temporals.createNow(),'yyyy-MM-dd') : null}" placeholder="dd/mm/yyyy" inputmode="numeric">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Ngày kết thúc</label>
                        <input type="text" th:field="*{ngayKetThuc}" class="form-control zaki-date" required
                            th:attr="data-min=${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}" placeholder="dd/mm/yyyy" inputmode="numeric">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Phương tiện</label>
                        <select class="form-select" th:field="*{idPhuongTien.id}">
                            <option th:each="pt : ${phuongTienList}" th:value="${pt.id}" th:text="${pt.loai}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Điểm xuất phát (admin chọn)</label>
                        <div class="border rounded-3 p-3 bg-white" style="max-height: 180px; overflow: auto;">
                            <div class="form-check" th:each="dd : ${diemDonList}">
                                <input class="form-check-input" type="checkbox" name="departureIds" th:value="${dd.id}"
                                    th:id="${'dep_' + dd.id}"
                                    th:checked="${selectedDepartureIds != null and selectedDepartureIds.contains(dd.id)}" />
                                <label class="form-check-label fw-semibold" th:for="${'dep_' + dd.id}" th:text="${dd.ten}"></label>
                            </div>
                            <div class="small text-muted mt-2">Bỏ chọn hết để hệ thống tự gán theo điểm đến.</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Châu lục</label>
                        <select id="chauLuc" class="form-select" th:attr="data-selected=${selectedChauLuc}">
                            <option value="">-- Chọn châu lục --</option>
                            <option value="Trong nước">Trong nước</option>
                            <option value="Châu Á">Châu Á</option>
                            <option value="Châu Âu">Châu Âu</option>
                            <option value="Châu Mỹ">Châu Mỹ</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Quốc gia</label>
                        <select id="quocGia" class="form-select" th:attr="data-selected=${selectedQuocGia}">
                            <option value="">-- Chọn quốc gia --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Thành phố</label>
                        <select id="thanhPho" class="form-select" th:field="*{idDiemDen.id}"
                            th:attr="data-selected=${selectedThanhPho}">
                            <option value="">-- Chọn thành phố --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Nơi lưu trú</label>
                        <select id="noiLuuTruSelect" class="form-select" name="idNoiLuuTru.id">
                            <option value="">-- Chọn nơi lưu trú --</option>
                            <option th:each="hotel : ${noiLuuTruList}" th:value="${hotel.id}" th:text="${hotel.ten}"
                                th:selected="${tour.idNoiLuuTru != null and tour.idNoiLuuTru.id == hotel.id}"
                                th:attr="data-gia-phong-don=${hotel.giaPhongDon != null ? hotel.giaPhongDon : defaultGiaPhongDon}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Giá phòng đơn</label>
                        <input type="number" name="giaPhongDon" id="giaPhongDonInput" class="form-control" min="0" step="1000"
                            th:value="${tour.idNoiLuuTru != null and tour.idNoiLuuTru.giaPhongDon != null ? tour.idNoiLuuTru.giaPhongDon : defaultGiaPhongDon}" required>
                        <small class="text-muted">Mặc định 500.000đ, có thể chỉnh riêng theo nơi lưu trú.</small>
                    </div>
                    <div class="col-md-6">
                        <label>Nổi bật:</label><br>
                        <input type="radio" th:field="*{noiBat}" th:value="true" id="yes">
                        <label for="yes">Yes</label>

                        <input type="radio" th:field="*{noiBat}" th:value="false" id="no">
                        <label for="no">No</label>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Mô tả</label>
                        <textarea th:field="*{moTa}" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Highlight</label>
                        <textarea th:field="*{highlight}" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Đổi ảnh mới (nếu có)</label>
                        <input type="file" name="file" class="form-control" accept="image/*">
                        <small class="text-muted">Để trống nếu giữ ảnh hiện tại.</small>
                        <label class="form-label fw-bold">Ảnh hiện tại</label>
                        <div>
                            <img th:src="@{${tour.hinhAnh}}" alt="Tour Picture" class="rounded shadow-sm mt-2"
                                style="height: 200px; object-fit: cover;">
                        </div>
                    </div>
                    <div class="col-12 text-end mt-3">
                        <button type="submit" class="btn btn-primary me-2">
                            <i class="bi bi-save"></i> Cập nhật
                        </button>
                        <a th:href="@{'/admin/tour/detail/' + ${tour.id}}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> Hủy
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script th:inline="javascript">
        const chauLucSelect = document.getElementById("chauLuc");
        const quocGiaSelect = document.getElementById("quocGia");
        const thanhPhoSelect = document.getElementById("thanhPho");
        const noiLuuTruSelect = document.getElementById("noiLuuTruSelect");
        const giaPhongDonInput = document.getElementById("giaPhongDonInput");
        const initialChauLuc = /*[[${selectedChauLuc}]]*/ '';
        const initialQuocGia = /*[[${selectedQuocGia}]]*/ '';
        const initialThanhPho = /*[[${selectedThanhPho}]]*/ '';

        function refreshSelect(sel) {
            if (window.ZakiSelect) ZakiSelect.refresh(sel);
        }

        function loadQuocGia(chauLuc, selectedQg) {
            quocGiaSelect.innerHTML = '<option value="">-- Chọn quốc gia --</option>';
            thanhPhoSelect.innerHTML = '<option value="">-- Chọn thành phố --</option>';
            refreshSelect(quocGiaSelect);
            refreshSelect(thanhPhoSelect);
            if (!chauLuc) return Promise.resolve();
            return fetch('/api/dia-diem/quoc-gia?chauLuc=' + encodeURIComponent(chauLuc))
                .then(function (r) { return r.json(); })
                .then(function (list) {
                    list.forEach(function (qg) {
                        const option = document.createElement('option');
                        option.value = qg;
                        option.textContent = qg;
                        if (selectedQg && qg === selectedQg) option.selected = true;
                        quocGiaSelect.appendChild(option);
                    });
                    refreshSelect(quocGiaSelect);
                });
        }

        function loadThanhPho(quocGia, selectedTp) {
            thanhPhoSelect.innerHTML = '<option value="">-- Chọn thành phố --</option>';
            refreshSelect(thanhPhoSelect);
            if (!quocGia) return Promise.resolve();
            return fetch('/api/dia-diem/thanh-pho?quocGia=' + encodeURIComponent(quocGia))
                .then(function (r) { return r.json(); })
                .then(function (list) {
                    list.forEach(function (tp) {
                        const option = document.createElement('option');
                        option.value = tp.id;
                        option.textContent = tp.thanhPho || tp.ten || ('#' + tp.id);
                        if (selectedTp && String(tp.id) === String(selectedTp)) option.selected = true;
                        thanhPhoSelect.appendChild(option);
                    });
                    refreshSelect(thanhPhoSelect);
                });
        }

        chauLucSelect.addEventListener('change', function () {
            loadQuocGia(this.value, null);
        });
        quocGiaSelect.addEventListener('change', function () {
            loadThanhPho(this.value, null);
        });

        if (noiLuuTruSelect && giaPhongDonInput) {
            noiLuuTruSelect.addEventListener('change', function () {
                const option = this.options[this.selectedIndex];
                const price = option ? option.getAttribute('data-gia-phong-don') : '';
                if (price) giaPhongDonInput.value = Math.round(parseFloat(price));
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (initialChauLuc) {
                chauLucSelect.value = initialChauLuc;
                loadQuocGia(initialChauLuc, initialQuocGia)
                    .then(function () { return loadThanhPho(initialQuocGia, initialThanhPho); });
            }
        });
    </script>
</body>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>

</html>
