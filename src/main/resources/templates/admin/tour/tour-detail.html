<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout/admin_layout :: head('Admin')}"></head>

<body>
    <header th:replace="~{layout/admin_layout:: header()}"></header>
    <div class="d-flex">
        <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{'/admin/tour/' + ${source}}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
                <div>
                    <a th:if="${source == 'active'}" th:href="@{'/admin/tour/edit/' + ${tour.id}}"
                        class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Sửa
                    </a>
                    <a th:href="@{/admin/tour/delete/{id}(id=${tour.id},source=${source})}" onclick="return confirm('Bạn có chắc muốn xóa chuyến đi này?');" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Xóa
                    </a>
                </div>
            </div>
            <h3 class="fw-bold mb-3" th:text="${tour.tieuDe}"></h3>
            <ul class="nav nav-tabs" id="tourTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="info-tab" data-bs-toggle="tab" data-bs-target="#info"
                        type="button" role="tab">Thông tin</button>
                </li>
                <li class="nav-item" role="presentation">
                    <a th:href="@{'/admin/tour/' + ${tour.id} + '/ngay-khoi-hanh'}" class="nav-link">
                        <i class="bi bi-calendar-event me-1"></i> Ngày khởi hành
                    </a>
                </li>
            </ul>

            <div class="tab-content mt-3" id="movieTabContent">
                <div class="tab-pane fade show active" id="info" role="tabpanel">
                    <div class="row g-4">
                        <div class="col-lg-4 text-center">
                            <img th:src="@{${tour.hinhAnh}}" class="img-fluid rounded shadow"
                                style="max-height:400px; object-fit:cover;">
                        </div>
                        <div class="col-lg-8">
                            <div class="card shadow-sm border-0">
                                <div class="card-body">
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Tiêu đề</div>
                                        <div class="col-md-8" th:text="${tour.tieuDe}"></div>
                                    </div>
                                    <hr>
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Giá dịch vụ</div>
                                        <div class="col-md-8 text-danger fw-bold"
                                            th:text="${#numbers.formatDecimal(tour.gia,0,'POINT',0,'COMMA')} + ' ₫'">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Ngày khởi hành</div>
                                        <div class="col-md-8"
                                            th:text="${#temporals.format(tour.ngayKhoiHanh,'dd-MM-yyyy')}">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Ngày kết thúc</div>
                                        <div class="col-md-8"
                                            th:text="${#temporals.format(tour.ngayKetThuc,'dd-MM-yyyy')}">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Phương tiện</div>
                                        <div class="col-md-8" th:text="${tour.idPhuongTien.loai}">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4 fw-semibold text-muted">Điểm đến</div>
                                        <div class="col-md-8" th:text="${tour.idDiemDen.thanhPho}">
                                        </div>
                                    </div>
                                    <hr>
                                    <div class="mb-2 fw-semibold text-muted">Mô tả</div>
                                    <div class="p-3 bg-light rounded" th:text="${tour.moTa}">
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div><!-- End tab content -->
        </div>
    </div>
    <footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
