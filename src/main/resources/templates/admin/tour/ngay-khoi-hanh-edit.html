<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{layout/admin_layout :: head('Sửa ngày khởi hành')}"></head>

<body>
    <header th:replace="~{layout/admin_layout:: header()}"></header>
    <div class="d-flex">
        <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{'/admin/tour/' + ${tour.id} + '/ngay-khoi-hanh'}"
                    class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
                <h4 class="fw-bold mb-0">Sửa ngày khởi hành</h4>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="fw-bold mb-3" th:text="${tour.tieuDe}"></h6>
                    <form th:action="@{'/admin/tour/' + ${tour.id} + '/ngay-khoi-hanh/update/' + ${nkh.id}}"
                        method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ngày đi <span class="text-danger">*</span></label>
                                <input type="date" name="ngayDi" class="form-control"
                                    th:value="${#temporals.format(nkh.ngay, 'yyyy-MM-dd')}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ngày về <span class="text-danger">*</span></label>
                                <input type="date" name="ngayVe" class="form-control"
                                    th:value="${nkh.ngayVe != null ? #temporals.format(nkh.ngayVe, 'yyyy-MM-dd') : ''}"
                                    required>
                            </div>
                        </div>

                        <!-- Thông tin hiện tại (readonly) -->
                        <hr class="my-4">
                        <h6 class="fw-bold text-muted">Thông tin vé hiện tại (sẽ tự cập nhật khi lưu)</h6>
                        <div class="row g-3 mt-1">
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Mã CB đi</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.maChuyenBayDi}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giờ bay đi</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.gioBayDi}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giá đi</label>
                                <input type="text" class="form-control form-control-sm"
                                    th:value="${nkh.giaVeDi != null ? #numbers.formatDecimal(nkh.giaVeDi, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'N/A'}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giờ đến đi</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.gioDenDi}"
                                    readonly>
                            </div>
                        </div>
                        <div class="row g-3 mt-1">
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Mã CB về</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.maChuyenBayVe}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giờ bay về</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.gioBayVe}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giá về</label>
                                <input type="text" class="form-control form-control-sm"
                                    th:value="${nkh.giaVeVe != null ? #numbers.formatDecimal(nkh.giaVeVe, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'N/A'}"
                                    readonly>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Giờ đến về</label>
                                <input type="text" class="form-control form-control-sm" th:value="${nkh.gioDenVe}"
                                    readonly>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Lưu & Cập nhật vé
                            </button>
                            <a th:href="@{'/admin/tour/' + ${tour.id} + '/ngay-khoi-hanh'}"
                                class="btn btn-outline-secondary ms-2">
                                Huỷ
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>

</html>
