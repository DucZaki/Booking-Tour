<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/admin_layout :: head('Quản lý đoàn theo ngày')}"></head>
<body>
<header th:replace="~{layout/admin_layout:: header()}"></header>
<div class="d-flex">
    <nav th:replace="~{layout/admin_layout :: nav()}"></nav>
    <div class="container-fluid mt-4 px-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
            <div>
                <h3 class="fw-bold mb-1"><i class="bi bi-calendar3-week me-2"></i>Quản lý đoàn theo ngày</h3>
                <p class="text-muted small mb-0">Chọn ngày để xem và điều hành tất cả chuyến khởi hành.</p>
            </div>
            <a th:href="@{/admin/tour/active}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-map"></i> Danh sách tour
            </a>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Chọn ngày</h6>
                        <form method="get" class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label small">Tháng</label>
                                <select name="month" class="form-select form-select-sm">
                                    <option th:each="m : ${#numbers.sequence(1,12)}" th:value="${m}"
                                            th:selected="${m == viewMonth}" th:text="'Tháng ' + ${m}"></option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Năm</label>
                                <select name="year" class="form-select form-select-sm">
                                    <option th:each="y : ${#numbers.sequence(viewYear - 1, viewYear + 1)}" th:value="${y}"
                                            th:selected="${y == viewYear}" th:text="${y}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Ngày cụ thể</label>
                                <input type="date" name="date" class="form-control form-control-sm"
                                       th:value="${#temporals.format(selectedDate, 'yyyy-MM-dd')}">
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary btn-sm w-100">Xem</button>
                            </div>
                        </form>
                        <div class="small text-muted mb-2">Ngày có đoàn trong tháng:</div>
                        <div class="d-flex flex-wrap gap-1">
                            <a th:each="entry : ${countByDate}"
                               th:href="@{/admin/departures(date=${#temporals.format(entry.key, 'yyyy-MM-dd')}, month=${viewMonth}, year=${viewYear})}"
                               class="btn btn-sm"
                               th:classappend="${entry.key.equals(selectedDate)} ? 'btn-dark' : 'btn-outline-secondary'"
                               th:text="${#temporals.format(entry.key, 'dd/MM')} + ' (' + ${entry.value} + ')'">
                            </a>
                            <span th:if="${#maps.isEmpty(countByDate)}" class="text-muted small">Chưa có đoàn trong tháng này.</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-0 pt-3">
                        <h5 class="fw-bold mb-0">
                            Đoàn ngày <span th:text="${#temporals.format(selectedDate, 'dd/MM/yyyy')}"></span>
                            <span class="badge bg-primary ms-2" th:text="${dayDepartures.size()} + ' đoàn'"></span>
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <div th:if="${#lists.isEmpty(dayDepartures)}" class="text-center text-muted py-5">
                            <i class="bi bi-calendar-x fs-1"></i>
                            <p class="mt-2 mb-0">Không có chuyến khởi hành vào ngày này.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(dayDepartures)}" class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>Tour</th>
                                    <th>Giờ tập trung</th>
                                    <th>HDV</th>
                                    <th>Chỗ</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="nkh : ${dayDepartures}">
                                    <td>
                                        <div class="fw-bold" th:text="${nkh.chuyenDi.tieuDe}">Tour</div>
                                        <div class="small text-muted" th:text="${nkh.maChuyenBayDi != null ? nkh.maChuyenBayDi : '—'}"></div>
                                    </td>
                                    <td th:text="${nkh.gioTapTrung != null ? nkh.gioTapTrung : '—'}">06:00</td>
                                    <td th:text="${nkh.guide != null ? nkh.guide.hoTen : 'Chưa gán'}">—</td>
                                    <td th:if="${capacityByNkh[nkh.id] != null}" th:with="cap=${capacityByNkh[nkh.id]}">
                                        <span th:text="${cap.booked} + '/' + ${cap.capacity}"></span>
                                    </td>
                                    <td th:unless="${capacityByNkh[nkh.id] != null}">—</td>
                                    <td>
                                        <span class="badge"
                                              th:with="depStatus=${T(edu.bookingtour.util.DepartureStatusUtil).effectiveStatus(nkh, T(java.time.LocalDateTime).now())}"
                                              th:classappend="${T(edu.bookingtour.util.DepartureStatusUtil).badgeClass(depStatus)}"
                                              th:text="${depStatus.label}"></span>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{/admin/tour/{tid}/ngay-khoi-hanh/{nid}/quan-ly(tid=${nkh.chuyenDi.id}, nid=${nkh.id})}"
                                           class="btn btn-sm btn-dark">
                                            <i class="bi bi-gear"></i> Quản lý
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{layout/admin_layout :: footer()}"></footer>
</body>
</html>
