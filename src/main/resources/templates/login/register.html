<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ZakiBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black">
    <div class="min-h-screen w-full flex">
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 bg-black">
            <div class="w-full max-w-md">
                <div class="flex items-center gap-3 mb-8">
                    <img th:src="@{/favicon.icon}" alt="Logo" class="w-32 h-32 rounded-xl border-4 border-[#FECF2F]">
                    <div>
                        <h1 class="text-2xl font-bold text-[#FECF2F]">ZakiBooking</h1>
                        <p class="text-sm text-gray-400">Khám phá thế giới cùng chúng tôi</p>
                    </div>
                </div>

                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Tạo tài khoản mới</h2>
                    <p class="text-gray-400">Đăng ký để bắt đầu hành trình khám phá</p>
                </div>

                <form th:action="@{/register}" method="post" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Tên đăng nhập</label>
                        <input type="text" name="tenDangNhap" placeholder="username" required
                            class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Họ và tên</label>
                        <input type="text" name="hoTen" placeholder="Nguyễn Văn A" required
                            class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Số điện thoại</label>
                        <input type="tel" name="number" placeholder="0901234567" required
                            class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" name="email" th:value="${param.email}" placeholder="example@email.com"
                            required
                            class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Mật khẩu</label>
                        <div class="relative">
                            <input type="password" id="password" name="matKhau" placeholder="••••••••" required
                                class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all pr-12">
                            <button type="button" onclick="togglePass('password')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#FECF2F]">👁️</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Xác nhận mật khẩu</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                                required
                                class="w-full px-4 py-3 bg-[#1a1a1a] border border-gray-800 rounded-lg text-white focus:ring-2 focus:ring-[#FECF2F] outline-none transition-all pr-12">
                            <button type="button" onclick="togglePass('confirmPassword')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#FECF2F]">👁️</button>
                        </div>
                    </div>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 accent-[#FECF2F]">
                        <label for="terms" class="text-sm text-gray-400">
                            Tôi đồng ý với <a href="#" class="text-[#FECF2F] hover:underline">Điều khoản dịch vụ</a> và
                            <a href="#" class="text-[#FECF2F] hover:underline">Chính sách bảo mật</a>
                        </label>
                    </div>
                    <button type="submit"
                        class="w-full py-3 bg-[#FECF2F] text-black font-semibold rounded-lg hover:bg-[#fdd915] transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Đăng ký
                    </button>
                </form>
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-gray-800"></div>
                    <span class="text-sm text-gray-500">hoặc</span>
                    <div class="flex-1 h-px bg-gray-800"></div>
                </div>
                <p class="text-center text-gray-400 text-sm">
                    Đã có tài khoản? <a th:href="@{/login}" class="text-[#FECF2F] hover:underline font-medium">Đăng
                        nhập</a>
                </p>
            </div>
        </div>
        <div class="hidden lg:block lg:w-1/2 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-[#FECF2F]/20 to-black/60 z-10"></div>
            <img src="https://images.unsplash.com/photo-1723065219121-3bfaf2170563?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
                alt="Travel" class="w-full h-full object-cover">
            <div class="absolute bottom-0 left-0 right-0 p-12 z-20">
                <h3 class="text-4xl font-bold text-white mb-4">Khám phá những điểm đến tuyệt vời</h3>
                <p class="text-xl text-gray-200">Hàng nghìn tour du lịch đang chờ bạn khám phá</p>
            </div>
        </div>
    </div>
    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>
