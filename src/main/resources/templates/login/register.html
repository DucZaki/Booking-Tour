<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ZakiBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black">
    <div class="min-h-screen w-full flex">
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 bg-black">
            <div class="w-full max-w-md">
                <div class="flex justify-center mb-10">
                    <img th:src="@{/favicon.icon}" alt="Logo" class="w-full h-auto rounded-2xl object-contain">
                </div>

                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Tạo tài khoản mới</h2>
                    <p class="text-gray-400">Đăng ký để bắt đầu hành trình khám phá cùng ZakiBooking</p>
                </div>

                <!-- Thông báo lỗi/thành công -->
                <div th:if="${errorMessage}"
                    class="mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-lg flex items-center gap-3 text-red-500">
                    <span class="text-xl">⚠️</span>
                    <p class="text-sm font-medium" th:text="${errorMessage}"></p>
                </div>
                <div th:if="${successMessage}"
                    class="mb-6 p-4 bg-green-500/10 border border-green-500/50 rounded-lg flex items-center gap-3 text-green-500">
                    <span class="text-xl">✓</span>
                    <p class="text-sm font-medium" th:text="${successMessage}"></p>
                </div>

                <form th:action="@{/register}" method="post" class="space-y-5" autocomplete="off">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Tên đăng nhập</label>
                            <input type="text" name="tenDangNhap" th:value="${nguoiDung.tenDangNhap}" placeholder="username" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Họ và tên</label>
                            <input type="text" name="hoTen" th:value="${nguoiDung.hoTen}" placeholder="Nguyễn Văn A" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Số điện thoại</label>
                            <input type="tel" name="number" th:value="${nguoiDung.number}" placeholder="0901234567" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all">
                        </div>
                        <div>
                            <label
                                class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" name="email" th:value="${nguoiDung.email}" placeholder="example@email.com" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Mật khẩu</label>
                        <div class="relative">
                            <input type="password" id="password" name="matKhau" placeholder="••••••••" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all pr-12">
                            <button type="button" onclick="togglePass('password')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[#FECF2F] transition-colors">👁️
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Xác nhận mật khẩu</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required
                                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:ring-2 focus:ring-[#FECF2F] focus:bg-white/10 outline-none transition-all pr-12">
                            <button type="button" onclick="togglePass('confirmPassword')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[#FECF2F] transition-colors">👁️
                            </button>
                        </div>
                    </div>

                    <div class="flex items-start gap-3">
                        <div class="flex items-center h-5">
                            <input type="checkbox" id="terms" required
                                class="w-4 h-4 rounded border-white/10 bg-white/5 text-[#FECF2F] focus:ring-[#FECF2F] cursor-pointer">
                        </div>
                        <label for="terms" class="text-sm text-gray-400">
                            Tôi đồng ý với <a href="#" class="text-[#FECF2F] hover:text-[#fdd915] transition-colors">Điều khoản dịch vụ</a> và
                            <a href="#" class="text-[#FECF2F] hover:text-[#fdd915] transition-colors">Chính sách bảo mật</a>
                        </label>
                    </div>

                    <button type="submit"
                        class="w-full py-4 bg-[#FECF2F] text-black font-bold rounded-xl hover:bg-[#fdd915] transition-all transform hover:scale-[1.01] active:scale-[0.99] shadow-lg shadow-[#FECF2F]/10">
                        Bắt đầu hành trình ngay
                    </button>
                </form>

                <div class="flex items-center gap-4 my-8">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-xs font-medium text-gray-600 uppercase tracking-widest">hoặc</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <p class="text-center text-gray-500 text-sm">
                    Đã là thành viên? <a th:href="@{/login}"
                        class="text-[#FECF2F] hover:text-[#fdd915] font-bold transition-colors">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
        <div class="hidden lg:block lg:w-1/2 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-[#FECF2F]/20 to-black/60 z-10"></div>
            <img src="https://images.unsplash.com/photo-1723065219121-3bfaf2170563?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
                alt="Travel" class="w-full h-full object-cover">
            <div class="absolute bottom-0 left-0 right-0 p-12 z-20">
                <h3 class="text-4xl font-bold text-white mb-4">Khám phá những điểm đến tuyệt vời</h3>
                <p class="text-xl text-gray-200">Hàng nghìn tour du lịch đang chờ bạn khám phá</p>
            </div>
        </div>
    </div>
    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>
