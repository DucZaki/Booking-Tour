<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ZakiBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Manrope', sans-serif; }
        .brand-gradient {
            background: linear-gradient(90deg, #FFFFFF 0%, #FECF2F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#0A0A0B] text-white">
    <div class="min-h-screen w-full flex flex-col lg:flex-row">
        <!-- Left Side: Login Form -->
        <div class="w-full lg:w-[45%] flex items-center justify-center p-8 sm:p-12 relative z-10">
            <div class="w-full max-w-md">
                <div class="mb-12">
                    <a th:href="@{/}" class="inline-block mb-8">
                        <img th:src="@{/favicon.icon}" alt="Logo" class="h-12 w-auto rounded-xl">
                    </a>
                    <h2 class="text-4xl font-heading font-extrabold mb-3 tracking-tight">Chào mừng <span class="brand-gradient">trở lại!</span></h2>
          
                </div>

                <div th:if="${param.error}" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-2xl flex items-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Tên đăng nhập hoặc mật khẩu không chính xác.
                </div>

                <form th:action="@{/perform-login}" method="post" class="space-y-6" autocomplete="off">
                    <div class="space-y-2">
                        <label for="username" class="block text-sm font-semibold text-white/70 ml-1">Tên đăng nhập / Email</label>
                        <input type="text" id="username" name="username" placeholder="name@company.com"
                            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-[#FECF2F] focus:border-transparent transition-all duration-300"
                            required />
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label for="password" class="block text-sm font-semibold text-white/70">Mật khẩu</label>
                            <a href="#" class="text-sm text-[#FECF2F] hover:text-[#fdd915] font-medium transition-colors">Quên mật khẩu?</a>
                        </div>
                        <div class="relative">
                            <input type="password" id="password" name="password" placeholder="••••••••"
                                class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-[#FECF2F] focus:border-transparent transition-all duration-300 pr-14"
                                required />
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-[#FECF2F] transition-colors p-2">
                                <span id="eye-icon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 ml-1">
                        <input type="checkbox" id="remember-me" name="remember-me" class="w-5 h-5 rounded-lg border-white/10 bg-white/5 text-[#FECF2F] focus:ring-[#FECF2F] focus:ring-offset-0">
                        <label for="remember-me" class="text-sm text-white/60 cursor-pointer select-none">Duy trì đăng nhập</label>
                    </div>

                    <button type="submit" class="w-full py-4 bg-[#FECF2F] text-[#0A0A0B] font-bold rounded-2xl hover:bg-[#fdd915] hover:shadow-[0_8px_30px_rgb(254,207,47,0.3)] transition-all duration-300 transform hover:-translate-y-1 active:scale-[0.98]">
                        Đăng nhập
                    </button>
                    
                    <a th:href="@{/}" class="block w-full py-4 bg-white/5 text-white font-semibold rounded-2xl hover:bg-white/10 border border-white/10 transition-all duration-300 text-center">
                        Tiếp tục với tư cách khách
                    </a>
                </form>

                <div class="relative my-10">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-4 bg-[#0A0A0B] text-white/30 font-medium lowercase">hoặc đăng nhập bằng</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <a href="/oauth2/authorization/google" class="flex items-center justify-center gap-3 py-4 px-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#FECF2F]/50 transition-all duration-300 group">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        <span class="text-sm font-semibold opacity-80 group-hover:opacity-100">Google</span>
                    </a>

                    <a href="/oauth2/authorization/facebook" class="flex items-center justify-center gap-3 py-4 px-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-[#1877F2]/50 transition-all duration-300 group">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.13 8.44 9.88v-6.99H7.9v-2.89h2.54V9.41c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.23.2 2.23.2v2.46h-1.25c-1.23 0-1.61.77-1.61 1.56v1.87h2.74l-.44 2.89h-2.3v6.99C18.34 21.13 22 16.99 22 12z"/></svg>
                        <span class="text-sm font-semibold opacity-80 group-hover:opacity-100">Facebook</span>
                    </a>
                </div>

                <p class="mt-10 text-center text-white/40 text-sm">
                    Chưa có tài khoản? <a th:href="@{/register}" class="text-[#FECF2F] hover:text-[#fdd915] font-bold transition-colors">Tham gia ngay</a>
                </p>
            </div>
        </div>

        <!-- Right Side: Cinematic Image -->
        <div class="hidden lg:block lg:w-[55%] relative overflow-hidden bg-black">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0B] via-transparent to-transparent z-10"></div>
            <img src="https://images.unsplash.com/photo-1723065219121-3bfaf2170563?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
                alt="Travel Destination" class="w-full h-full object-cover scale-105 hover:scale-110 transition-transform duration-[10000ms] " />
            <div class="absolute bottom-16 left-16 right-16 z-20">
                <div class="p-8 bg-white/5 backdrop-blur-3xl rounded-[32px] border border-white/10 max-w-xl">
                    <h3 class="text-4xl font-heading font-extrabold text-white mb-4 leading-tight">Khám phá thế giới, <br><span class="brand-gradient">Kiến tạo hành trình.</span></h3>
                    <p class="text-white/60 text-lg">Trải nghiệm những dịch vụ du lịch hàng đầu với ZakiBooking.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        }
    </script>
</body>

</html>
